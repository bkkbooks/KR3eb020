body:
  text: 卷二叔和脈經止論二十四種若夫長短二脈缺而不載牢革二脈混而不分更有七至名極即為疾脈是指下恆見者又何可廢乎共得二十八脈縷析而詳為之辨稍挾疑溷者悉簡其訛從來晦蝕之義今始得而昭明然皆考據典章衷極理要終不敢以憑臆之説罔亂千秋也浮脈陽體象浮在皮毛如水漂木舉之有餘按之不足主病浮脈為陽其病在表寸浮傷風頭疼鼻塞左關浮者風在中焦右關浮者風痰在膈尺部得之下焦風熱小便不利大便祕澀兼脈無力表虛有力表實浮緊風寒浮遲中風浮數風熱浮緩風濕浮芤失血浮短氣病浮洪虛熱浮虛暑憊浮澀血傷浮濡氣敗按浮之為義如木之浮水面也浮脈法天輕清在上之象在卦為乾在時為秋在人為肺素問曰其氣來毛而中央堅兩旁虛此為太過病在外其氣來毛而微此為不及病在中又曰太過則氣逆而眥痛不及則喘少氣而咳上氣見血又曰肺脈厭厭聶聶如落榆莢曰肺平肺脈不上不下如循雞羽曰肺病肺脈來如物之浮如風吹毛曰肺死王叔和云舉之有餘按之不足最合浮脈之義黎氏以為如捻蔥葉則溷於芤脈矣崔氏云有表無里有上無下則脫然無根又溷於散脈矣偽訣云尋之如太過是中候盛滿與浮之名義有何干涉乎須知浮而盛大為洪浮而軟大為虛浮而柔細為濡浮而無根為散浮而弦芤為革浮而中空為芤毫釐疑似之間相去便已千里可不細心體認哉寸關尺俱浮直上直下或癲或癇腰背強痛不可俯仰此督脈為病也夫肺藏職秋金天地之氣至秋而降且金性重而下沉何以與浮脈相應耶不知肺金雖沉然所主者實陽氣也況處於至高為五臟六腑之華蓋輕清之用與乾天合德故與浮脈相應耳沉脈陰體象沉行筋骨如水投石按之有餘舉之不足主病沉脈為陰其病在裡寸沉短氣胸痛引脅或為痰飲或水與血關主中寒因而痛結或為滿悶吞酸筋急尺主背痛亦主腰膝陰下濕癢淋濁痢泄兼脈無力裡虛有力裡實沉遲痼冷沉數內熱沉滑痰飲沉澀血結沉弱虛衰沉牢堅積沉緊冷疼沉緩寒濕按沉之為義如石之沉於水底也沉脈法地重濁在下之象在卦為坎在時為冬在人為腎黃帝曰冬脈如營何如而營岐伯曰冬脈腎也北方之水也萬物所以含藏其氣來沉以軟故曰營其氣如彈石者此為太過病在外令人解㑊脊脈痛而少氣不欲言其虛如數者此謂不及病在中令人心懸如飢䏚中清脊中痛少腹痛小便黃赤又曰脈來喘喘纍纍如鉤按之而堅曰腎平冬以胃氣為本脈如引葛按之益堅曰腎病脈來發如奪索辟辟如彈石曰腎死楊氏曰如綿裹砂內剛外柔審度名義頗不相戾偽訣妄云緩度三關狀如爛綿則是弱脈而非沉脈矣若緩度三關尤不可曉沉而細軟為弱脈沉而弦徑為牢脈沉而著骨為伏脈剛柔淺深之間宜熟玩而深思也夫腎之為臟配坎應冬萬物蟄藏陽氣下陷烈為雪霜故其脈主沉陰而居里若誤與之汗則如蟄蟲出而見霜誤與之下則如飛蛾入而見湯此叔和入理之微言後世之指南也遲脈陰體象遲脈屬陰象為不及往來遲慢三至一息主病遲脈主藏其病為寒寸遲上寒心痛停凝關遲中寒癥結攣筋尺遲火衰溲便不禁或病腰足疝痛牽陰兼脈有力積冷無力虛寒浮遲表冷沉遲裡寒遲澀血少遲緩濕寒遲滑脹滿遲微難安按遲之為義遲滯而不能中和也脈以一息四至為和平若一息三至則遲而不及矣陰性多滯故陰寒之症脈必見遲也譬如太陽隸於南陸則火度而行數隸於北陸則水度而行遲即此可以徵陰陽遲速之故矣偽訣云重手乃得是沉脈而非遲矣又云狀且難是澀脈而非遲矣一息三至甚為分明而誤云隱隱是微脈而非遲矣遲而不流利則為澀脈遲而有歇止則為結脈遲而浮大且軟則為虛脈至於緩脈絶不相類夫緩以脈形之寬緩得名遲以至數之不及為義故緩脈四至寬緩和平遲脈三至遲滯不前然則二脈各別又安足溷哉以李瀕湖之通達亦云小快於遲作緩持以至數論緩脈是千慮之一失也王叔和曰一呼一至曰離經二呼一至曰奪精三呼一至曰死四呼一至曰命絶此損之脈也一損損於皮毛二損損於血脈三損損於肌肉四損損於筋五損損於骨是知脈之至數愈遲則症之陰寒益甚矣數脈陽體象數脈屬陽象為太過一息六至往來越度主病數脈主腑其病為熱寸數喘咳口瘡肺癰關數胃熱邪火上攻尺數相火遺濁淋癃兼脈有力實火無力虛火浮數表熱沉數里熱陽數君火陰數相火右數火亢左數陰戕按數之為義躁急而不能中和也一呼脈再動氣行三寸一吸脈再動氣行三寸呼吸定息氣行六寸一晝一夜凡一萬三千五百息當五十周於身脈行八百一十丈此經脈周流恆常之揆度也若一息六至豈非越其常度耶火性急速故陽盛之症脈來必數也偽訣云七表八里而獨遺數脈只歌於心臟此其過非淺鮮也數而弦急則為緊脈數而流利則為滑脈數而有止則為促脈數而過極則為疾脈數如豆粒則為動脈古人云脈書不厭千回讀熟讀深思理自知只如相類之脈非深思不能辨別非熟讀不能諳識也王叔和云一呼再至曰平三至曰離經四至曰奪精五至曰死六至曰命盡此至之脈也乃知脈形愈數則受症愈熱矣肺部見之為金家賊脈秋月逢之為克令凶徵也滑脈陽中之陰體象滑脈替替往來流利盤珠之形荷露之義主病滑脈為陽多主痰液寸滑咳嗽胸滿吐逆關滑胃熱壅氣傷食尺滑病淋或為痢積男子溺血婦人經郁兼脈浮滑風痰沉滑痰食滑數痰火滑短氣塞滑而浮大尿則陰痛滑而浮散中風癱緩滑而沖和娠孕可決按滑之為義往來流利而不澀滯也陰氣有餘故脈來流利如水夫脈者血之府也血盛則脈滑故腎脈宜之張仲景以翕奄沉為滑而人莫能解蓋翕者浮也奄者忽也謂忽焉而沉摩寫往來流利之狀極為曲至也偽訣云按之即伏三關如珠不進不退與滑之名義殊屬支離曰伏曰不進不退尤為怪誕王叔和以關滑為胃家有熱偽訣以關滑為胃家有寒叔和以尺滑為下焦蓄血偽訣以尺滑為臍下如冰何相反悖謬一至此乎又考叔和云與數相似則滑必兼數而李時珍以滑為陰氣有餘是何其不相合耶或當以浮沉尺寸為辨耳滑脈為陽中之陰以其形兼數也故為陽以其形如水也故為陽中之陰大抵兼浮者毗於陽兼沉者毗於陰是以或熱或寒古無定稱也衡之以浮沉辨之以尺寸庶無誤耳澀脈陰體象澀脈蹇滯如刀刮竹遲細而短三象俱足主病澀為血少亦主精傷寸澀心痛或為怔忡關澀陰虛因而中熱右關土虛左關脅脹尺澀遺淋血痢可決孕為胎病無孕血竭兼脈澀而堅大為有實熱澀而虛軟虛火炎灼按澀者不流利不爽快之義也內經曰參伍不調謂之凝滯而至數不和勻也脈訣以輕刀刮竹為喻者刀刮竹則阻滯而不滑也通真子以如雨沾沙為喻者謂雨沾金石則滑而流利雨沾沙土則澀而不流也李時珍以病蠶食葉為喻者謂其遲慢而艱難也偽訣云指下尋之似有舉之全無則是微脈而非澀脈也王叔和謂其一止復來亦有疵病蓋澀脈往來遲難有類乎止而實非止也又曰細而遲往來難且澀者乃浮分多而沉分少有類乎散而實非散也須知極軟似有若無為微脈浮而且細且軟為濡脈沉而且細且軟為弱脈三者之脈皆指下模糊而不清爽有似乎澀而確有分別也肺之為臟氣多血少故右寸見之為合度之診腎之為臟專司精血故左尺見之為虛殘之候不問男婦凡尺中沉澀者必艱於嗣正血少精傷之症也如懷子而得澀脈則血不足以養胎如無孕而得澀脈將有陰衰髓竭之憂大抵一切世間之物濡潤則必滑枯稿則必澀故滑為痰飲澀主陰衰理有固然無足疑者虛脈陰體象虛合四形浮大遲軟及乎尋按幾不可見主病虛主血虛又主傷暑左寸心虧驚悸怔忡右寸肺虧自汗氣怯左關肝傷血不營筋右關脾寒食不消化左尺水衰腰膝痿痹右尺火衰寒症蜂起按虛之為義中空不足之象也專以軟而無力得名也叔和云虛脈遲大而軟按之豁豁然空此言最為合義雖不言浮字而曰按之豁豁然空則浮字之義已包含具足矣崔紫虛以為形大力薄其虛可知但欠遲字之義耳偽訣云尋之不足舉之有餘是浮脈而非虛脈矣浮以有力得名虛以無力取象有餘二字安可施之虛脈乎楊仁齋曰狀為柳絮散漫而遲滑氏曰散大而軟二家之言俱是散脈而非虛脈矣夫虛脈按之雖軟猶可見也散脈按之絶無不可見也虛之異於濡者虛則遲大而無力濡則細小而無力也虛之異於芤者虛則愈按而愈軟芤則重按而仍見也王叔和曰血虛脈虛而獨不言氣虛者何也氣為陽主浮分血為陰主沉分今浮分大而沉分空故獨主血虛耳夫虛脈兼遲遲為寒象大凡症之虛極者必挾寒理勢然也故虛脈行指下則益火之原以消陰翳可劃然決矣更有浮取之而且大且軟重按之而豁然似無此名內真寒外假熱古人以附子理中湯冰冷與服治以內真熱而外假寒之劑也實脈陽體象實脈有力長大而堅應指愊愊三候皆然主病血實脈實火熱壅結左寸心勞舌強氣湧右寸肺病嘔逆咽疼左關見實肝火脅痛右關見實中滿氣疼左尺見實便閉腹疼右尺見實相火亢逆兼脈實而且緊寒積稽留實而且滑痰凝為祟按實之為義邪氣盛滿堅徑有餘之象也既大矣而且兼長既長大矣而且有力既長大有力矣而且浮中沉三候皆然則諸陽之象莫不畢備焉見此脈者必有大邪大熱大積大聚故王叔和脈經云實脈浮沉皆得脈大而長微弦應指愊愊然又曰血實脈實又曰脈實者水穀為病又曰氣來實強是謂太過由是測之則但主實熱不主虛寒較若列眉矣故叔和有尺實則小便難之説乃偽訣謬以尺實為小便不禁奈何與叔和適相反耶又妄謂如繩應指來則是緊脈之形而非實脈之象矣夫緊脈之與實脈雖相類而實相懸蓋緊脈弦急如切繩而左右彈人手實脈則且大且長三候皆有力也緊脈者熱為寒束故其象繃急而不寬舒實脈者邪為火迫故其象堅滿而不和柔以症合之以理察之便昭然於心目之間而不可混淆矣又按張潔古惑於偽訣實主虛寒之説而遂以薑附施治此甚不可為訓也或實脈而兼緊者庶乎相當苟非緊象而大溫之劑施於大熱之人其不立斃者幾希矣以潔古之智當必是兼緊之治無疑耳長脈陽體象長脈迢迢首尾俱端直上直下如循長竿主病長主有餘氣逆火盛左寸見長君火為病右寸見長滿逆為定左關見長木實之殃右關見長土鬱脹悶左尺見長奔豚沖兢右尺見長相火專令按長之為義首尾相稱往來端直也在時為春在卦為震在人為肝肝主春生之令天地之氣至此而發舒脈象應之故得長也內經曰長則氣治李月池曰心脈長者神強氣壯腎脈長者蒂固根深皆言平脈也如上文主病云云皆言病脈也內經曰肝脈來軟弱招招如揭長竿末梢曰肝平肝脈來盈實而滑如循長竿曰肝病故知長而和緩即合春生之氣而為健旺之徵長而硬滿即屬火亢之形而為疾病之應也舊説過於本位名為長脈久久審度而知其必不然也寸而上過則為溢脈寸而下過則為關脈關而上過即屬寸脈關而下過即屬尺脈尺而上過即屬關脈尺而下過即屬覆脈由是察之然則過於本位理之所必無而義之所不合也惟其狀如長竿則直上直下首尾相應非若他脈之上下參差首尾不勻者也凡實牢弦緊皆兼長脈故古人稱長主有餘之疾非無本之説也短脈陰體象短脈澀小首尾俱俯中間突起不能滿部主病短主不及為氣虛症短居左寸心神不定短見右寸肺虛頭痛短在左關肝氣有傷短在右關膈間為殃左尺見短少腹必疼右尺見短真火不隆按短之為象兩頭沉下而中間獨浮也在時為秋在人為肺肺應秋金天地之氣至是而收斂人身一小天地故畜縮之象相應而短脈見也內經曰短則氣病蓋以氣屬陽主乎充沛若短脈獨見氣衰之確兆也然肺為主氣之臟偏與短脈相應則又何以説也素問曰肺之平脈厭厭聶聶如落榆莢則短中自有和緩之象氣仍治也若短而沉且澀而謂氣不病可乎高陽生以短脈為中間有兩頭無為不及本位嘗衷之以至理而知其説不能無弊也蓋脈以貫通為義一息不運則機緘窮一毫不續則穹壤判豈有斷絶不通之理哉假使上不貫通則為陽絶下不貫通則為陰絶俱為必死之脈矣戴同父亦悟及此而云短脈只宜見於尺寸若關中見短是上不通寸下不通尺為陰陽絶脈而必死據同父之説極為有見然尺與寸可短依然落於陰絶陽絶矣非兩頭斷絶也特兩頭俯而沉下中間突而浮起仍自貫通者也叔和云應指而回不能滿部亦非短脈之合論也李時珍曰長脈屬肝宜於春短脈屬肺宜於秋但診肺肝則長短自見故知非其時非其部即為病脈也洪脈陽體象洪脈極大狀如洪水來盛去衰滔滔滿指主病洪為盛滿氣壅火亢左寸洪大心煩舌破右寸洪大胸滿氣逆左關見洪肝木太過右關見洪脾土脹熱左尺洪大水枯便難右尺洪大龍火燔灼按洪脈即大脈也如堯時洪水之洪喻其盛滿之象在卦為離在時為夏在人為心時當朱夏天地之氣酣滿暢遂脈者氣之先聲故應之以洪洪者大也以水喻也又曰鉤者以木喻也夏木繁滋枝葉敷布重而下垂故如鉤也鉤即是洪名異實同素問以洪脈為來盛去衰頗有微旨大抵洪脈只是根腳闊大卻非堅硬若使大而堅硬則為實脈而非洪脈矣內經謂大則病進亦以其氣方張也黃帝問曰夏脈如鉤何如而鉤岐伯曰夏脈心也南方火也萬物所以盛長也其氣來盛去衰故曰鉤反此者病黃帝曰何如而反岐伯曰其氣來盛去亦盛此謂太過病在外其氣來不盛去反盛此謂不及病在中太過則令人身熱而膚痛為浸淫不及則令人煩心上見咳唾下為氣泄王叔和云夏脈洪大而散名曰平脈反得沉濡而滑者是腎之乘心水之剋火為賊邪死不治反得大而緩者是脾之乘心子之扶母為實邪雖病自愈反得弦細而長者是肝之乘心母之歸子為虛邪雖病易治反得浮澀而短者是肺之乘心金之凌火為微邪雖病即瘥凡失血下利久嗽久病之人俱忌洪脈脈經曰形瘦脈大而多氣者死可見形症不與脈相合者均非吉兆微脈陰體象微脈極細而又極軟似有若無欲絶非絶主病微脈模糊氣血大衰左寸驚怯右寸氣促左關寒攣右關胃冷左尺得微髓絶精枯右尺得微陽衰命絶按微之為言若有若無也其象極細極軟古人以塵與微並稱便可想見其細軟之極矣張仲景曰瞥瞥如羹上肥狀其軟而無力也縈縈如蛛絲狀其細而難見也所以古人有言曰似有若無欲絶非絶惟斯八字可為微脈傳神若診者心神浮越未能虛靜而卒然持之竟不得而見也世俗未察微脈之義每見脈之細者輒以微細並稱是何其言之不審耶輕按之而如無故曰陽氣衰重按之而欲絶故曰陰氣竭長病得之多不可救者謂正氣將次滅絶也卒病得之猶或可生者謂邪氣不至深重也李時珍曰微主久虛血弱之病陽微則惡寒陰微則發熱自非峻補難可回春高陽生曰虛中日久為崩帶漏下多時骨亦枯尚未足以概微之主病也算數者以十微為一忽十忽為一絲十絲為一毫十毫為一釐由是推之則一釐之少分而為萬方始名微則微之渺小難見蓋可知矣細脈陰體象細直而軟纍纍縈縈狀如絲線較顯於微主病細主氣衰諸虛勞損細居左寸怔忡不寐細在右寸嘔吐氣怯細入左關肝陰枯竭細入右關胃虛脹滿左尺若細泄痢遺精右尺若細下元冷憊按細之為義小也細也狀如絲也微脈則模糊而難見細脈則顯明而易見故細比於微稍稍較大也偽訣乃云極細則是微脈而非細脈矣王啓玄曰狀如莠蓬善摩其柔細之態也王叔和脈經云細為血少氣衰有此症則順無此症則逆故吐利失血得沉細者生憂勞過度之人脈亦多細為自戕其氣血也春夏之令少壯之人俱忌細脈謂其不與時合不與形合也秋冬之際老弱之人不在禁忌之例大抵細脈微脈俱為陽氣衰殘之候內經曰氣主煦之非行溫補何以復其散失之元乎嘗見虛損之人脈已細而身常熱醫者不究其元而以涼劑投之何異於惡醉而強酒遂使真陽散敗飲食不進上嘔下泄是速之使斃耳素問曰壯火食氣少火生氣人非少火無以運行三焦熟腐水穀未徹乎此者安足以操司命之權哉然虛勞之脈細數不可並見並見者必死細則氣衰數則血敗氣血交窮短期將至雖和緩投治亦無回生之日矣濡脈陰中之陽體象濡脈細軟見於浮分舉之乃見按之即空主病濡主陰虛髓絶精傷左寸見濡健忘驚悸右寸見濡腠虛自汗左關逢之血不營筋右關逢之脾虛濕侵左尺得濡精血枯損右尺得之火敗命乖按濡之為名即軟之義也必在浮候見其細軟若中候沉候不可得而見也王叔和比之帛浮水面李時珍比之水上浮漚皆曲狀其隨手而沒之象也脈經言輕手相得按之無有偽訣反言按之似有舉還無悖戾一至此耶且按之則似有舉之則全無是弱脈而非濡脈矣濡脈之浮軟與虛脈相類但虛脈形大而濡脈形小也濡脈之細小與弱脈相類但弱在沉分而濡在浮分也濡脈之無根與散脈相類但散脈從浮大而漸至於沉絶濡脈從浮小而漸至於不見也從大而至無者為全凶之象從小而之無者為吉凶相半也浮主氣分浮舉之而可得氣猶未敗沉主血分沉按之而全無血已傷殘在久病老年之人見之尚未至於命絶為其脈與症合也若平人及少壯及暴病見之名為無根之脈去死不遠矣弱脈陰體象弱脈細小見於沉分舉之則無按之乃得主病弱為陽陷真氣衰弱左寸心虛驚悸健忘右寸肺虛自汗短氣左關木枯必苦攣急右關土寒水穀之疴左尺弱形涸流可徵右尺若見陽陷可驗按弱之為義沉而細小之候也叔和脈經云弱脈極軟而沉細按之乃得舉手無有何其彰明詳盡也偽訣乃借叔和之名以欺世者而反以弱脈為輕手乃得是明與叔和相戾且是濡脈之形而非弱脈之象矣因知高陽生誤以濡脈為弱弱脈為濡不意欲立言之人而不加考據乃爾耶即黎氏浮漚之喻亦誤以濡脈為弱脈矣夫浮以候陽陽主氣分浮取之而如無則陽氣衰微確然可據夫陽氣者所以衛外而為固者也亦所以運行三焦熟腐五穀者也弱脈呈形而陰霾已極自非見睍而陽何以復耶素問曰脈弱以滑是有胃氣脈弱以澀是為久病愚謂弱堪重按陰猶未絶若兼澀象則氣血交敗生理滅絶矣仲景云陽陷入陰當惡寒發熱久病及衰年見之猶可維援新病及少壯得之必死安待柳氏曰氣虛則脈弱寸弱陽虛尺弱陰虛關弱胃虛緊脈陰中之陽體象緊脈有力左右彈人如絞轉索如切緊繩主病緊主寒邪亦主諸痛左寸逢緊心滿急痛右寸逢緊傷寒喘嗽左關人迎浮緊傷寒右關氣口沉緊傷食左尺見之臍下痛極右尺見之奔豚疝疾兼脈浮緊傷寒沉緊傷食急而緊者是為遁尸數而緊者當主鬼祟按緊者繃急而兼絞轉之形也古稱熱則筋縱寒則筋急此惟熱鬱於內而寒束於外故緊急絞轉之象徵見於脈耳素問曰往來有力左右彈人手則剛徑之概可鞠夫寒者北方剛徑肅殺之氣故緊急中復兼左右彈手之象耳仲景曰如轉索無常叔和曰數如切繩丹溪曰如紉簟線譬如以二股三股糾合為繩必旋轉而絞乃緊而成繩耳可見緊之為義不獨縱有挺急抑且橫有轉側也苟非橫有轉側則內經之左右彈人仲景之轉索丹溪之紉線叔和之切繩將何所取義乎高陽生偽訣未察諸家之説而妄云寥寥入尺來不知於緊之義何居乎蓋緊之挺急而徑與弦相類但比之於弦更有加於挺徑之異及轉如繩線之狀也中惡祟乘之脈而得浮緊謂邪方熾而脈無根也咳嗽虛損之脈而得沉緊謂正已虛而邪已痼也咸在不治之例緩脈陰體象緩脈四至來往和勻微風輕颭初春楊柳兼脈主病緩為胃氣不主於病取其兼見方可斷症浮緩風傷沉緩寒濕緩大風虛緩細濕痹緩澀脾薄緩弱氣虛左寸澀緩少陰血虛右寸浮緩風邪所居左關浮緩肝風內鼓右關沉緩土弱濕侵左尺緩澀精宮不及右尺緩細真陽衰極按緩脈以寬舒和緩為義與緊脈正相反也在卦為坤在五行為土在時令為四季之末在人身為足太陰脾若陽寸陰尺上下同等浮大而軟無有偏勝者和平之脈也故曰緩而和勻不浮不沉不大不小不疾不徐意氣欣欣悠悠揚揚難以名狀者此真胃氣脈也又云土為萬物之母中氣調和則百疾不生又一切脈中皆須挾緩謂之胃氣但得本臟之脈無胃氣以和之則真臟脈見與之短期又曰有胃氣則生無胃氣則死緩之於脈大矣哉是故緩脈不主疾病惟考其兼見之脈乃可斷其為病耳岐伯曰脾者土也孤臟以灌四旁者也善者不可見惡者可見其來如水之流者此為太過病在外如烏之喙此謂不及病在中太過則令人四肢沉重不及則令人九竅壅塞不通王叔和脈經云脾旺之時其脈大阿阿而緩名曰平脈反得弦細而長者是肝之乘脾木之剋土為賊邪死不治反得浮澀而短是肺之乘脾子之扶母為實邪雖病自愈反得洪大而散者是心之乘脾母之歸子為虛邪雖病易治反得沉濡而滑者是腎之乘脾水之凌土為微邪雖病即瘥高陽生偽訣以緩脈主脾熱口臭反胃齒痛夢鬼諸症出自杜撰與緩脈無涉也弦脈陽中之陰體象弦如琴絃輕虛而滑端直以長指下挺然主病弦為肝風主痛主瘧主痰主飲弦在左寸心中必痛弦在右寸胸及頭疼左關弦見痰瘧癥瘕右關弦見胃寒膈痛左尺逢弦飲在下焦右尺逢弦足攣疝痛兼脈浮弦支飲沉弦懸飲弦數多熱弦遲多寒弦大主虛弦細拘急陽弦頭痛陰弦腹痛單絃飲癖雙弦寒痼按弦之為義如琴絃之挺直而略帶長也在八卦為震在五行為木在四時為春在五臟為肝經曰少陽之氣溫和軟弱故脈為弦岐伯曰春脈肝也東方木也萬物之所以始生也故其氣來濡弱輕虛而滑端直以長故曰弦反此者病其氣來實而強此為太過病在外其氣來不實而微此為不及病在中太過則令人善怒忽忽眩冒而巔疾不及則令人胸脅痛引背兩脅脹滿又曰肝脈來濡弱迢迢如揭長竿末梢曰肝平又曰肝脈來盈實而滑如循長竿曰肝病肝脈來急而益徑如張弓弦曰肝死弦脈與長脈皆主春令但弦為初春之象陽中之陰天氣猶寒故如琴絃之端直而挺然稍帶一分之緊急也長為暮春之象純屬於陽絶無寒意故如木干之迢直以長純是發生之氣象也戴同父云弦而軟其病輕弦而硬其病重深契內經之旨兩關俱弦謂之雙弦若不能食為木來剋土土已負也必不可治素問云端直以長叔和云如張弓弦巢氏云按之不移察察如按琴瑟弦戴同父云從中直過挺然指下諸家之論弦脈可謂深切著明矣高陽生乃言時時帶數又言脈緊狀繩牽則是緊脈之象安在其弦脈之義哉動脈陽體象動無頭尾其動如豆厥厥動搖必兼滑數主病動脈主痛亦主於驚左寸得動驚悸可斷右寸得動自汗無疑左關若動驚及拘攣右關若動心脾疼痛左尺見之亡精為病右尺見之龍火奮迅按動之為義以厥厥動搖急數有力得名也兩頭俯下中間突起極與短脈相類但短脈為陰不數不硬不滑也關前為陽關後為陰故仲景云陽動則汗出分明指左寸屬心汗為心之液右寸屬肺主皮毛而司腠理故汗出也又曰陰動則發熱分明指左尺見動為腎水之不足右尺見動謂相火虛炎故發熱也因是而知舊説言動脈只見於關上者非也且素問曰婦人手少陰心脈動甚者為妊子也然則手少陰明隸於左寸矣而謂獨見於關可乎成無己曰陰陽相搏則虛者動故陽虛則陽動陰虛則陰動以關前為陽主汗出關後為陰主發熱豈不精妥而龐安常強為之説云關前三分為陽關後三分為陰正當關位半陰半陽故動隨虛見是亦泥動脈只見於關之説也高陽生偽訣云尋之似有舉之還無是弱脈而非動脈矣又曰不離其處不往不來三關沉沉含糊謬妄無一字與動脈合義矣詹氏曰如鉤如毛則混於浮大之脈尤堪捧腹促脈陽體象促為急促數時一止如趨而蹶進則必死主病促因火亢亦因物停左寸見促心火炎炎右寸見促肺鳴咯咯促見左關血滯為殃促居右關脾宮食滯左尺逢之遺滑堪憂右尺逢之灼熱為定按促之為義於急促之中時見一歇止為陽盛之象也黎氏曰如蹶之趣徐疾不常深得其義王叔和云促脈來去數時一止復來亦頗明快夫人身之氣血貫注於經脈之間者刻刻流行綿綿不息凡一晝夜當五十營不應數者名曰狂生其應於脈之至數者如鼓應桴罔或有忒也臟氣乖違則稽留凝泣阻其運行之機因而歇止者其症為輕若真元衰憊則陽弛陰涸失其揆度之常因而歇止者其症為重然促脈之故得於臟氣乖違者十之六七得於真元衰憊者十之二三或因氣滯或因血凝或因痰停或因食壅或外因六氣或內因七情皆能阻遏其運行之機故雖當往來急數之時忽見一止耳如止數漸稀則為病瘥止數漸增則為病劇偽訣但言並居寸口已非促脈之義且不言時止尤為瞶瞶矣燕都王湛六以脾泄求治神疲色瘁診得促脈或十四五至得一止或十七八至得一止余謂其原醫者曰法在不治而醫者爭之曰此非代脈不過促耳何先生之輕命耶余曰是真元敗壞陰陽交窮而促脈呈形與稽留凝泣而見促者不相侔也醫者唯唯居一月果歿結脈體象結為凝結緩時一止徐行而怠頗得其旨主病結屬陰寒亦因凝積左寸心寒疼痛可決右寸肺虛氣寒凝結左關結見疝瘕必現右關結形痰滯食停左尺結見痿躄之疴右尺見結陰寒為楚按結之為義結而不散遲滯中時見一止也古人譬之徐行而怠偶羈一步可為結脈傳神大凡熱則流行寒則停滯理勢然也夫陰寒之中且挾凝結喻如隆冬天氣嚴肅流水冰堅也少火衰弱中氣虛寒失其干健之運則氣血痰食互相糾纏運行之機緘不利故脈應之而成結也越人云結甚則積甚結微則氣微浮結者外有痛積伏結者內有積聚故知結而有力者方為積聚結而無力者是真氣衰弱違其運化之常惟一味溫補為正治也仲景云纍纍如循長竿曰陰結藹藹如車蓋曰陽結王叔和云如麻子動搖旋引旋收聚散不常曰結主死夫是三者雖同名為結而義實有別浮分得之為陽結沉分得之為陰結止數頻多參伍不調為不治之症由斯測之則結之主症未可以一端盡也偽訣云或來或去聚而卻還律以緩時一止之義幾同寐語矣代脈陰體象代為禪代止有常數不能自還良久復動主病代主臟衰危惡之候脾土敗壞吐利為咎中寒不食腹疼難救兩動一止三四日死四動一止六七日死次第推求不失經旨按代者禪代之義也如四時之禪代不愆其期也結促之止止無常數代脈之止止有常數結促之止一止即來代脈之止良久方還內經以代脈一見為臟氣衰微脾氣脫絶之診也惟傷寒心悸懷胎三月或七情太過或跌打重傷及風家痛症俱不忌代脈未可斷其必死耳滑伯仁曰無病而羸瘦脈代者危候也有病而氣血乍損只為病脈此伯仁為暴病者言也若久病得代脈而冀其回春者萬不得一也內經曰代則氣衰又曰代散者死夫代脈見而脾土衰散脈見而腎水絶二脈交見雖在神聖亦且望而卻走矣大抵脈來一息五至則肺心脾肝腎五臟之氣皆足也故五十動而不一止者合大衍之數謂之平脈反此則止乃見焉腎氣不能至則四十動一止肝氣不能至則三十動一止脾氣不能至則二十動一止心氣不能至則十動一止肺氣不能至則四五動一止戴同父云三部九候每候必滿五十動出自難經而偽訣五臟歌中皆以四十五動為準乖於經旨偽訣又云四十一止一臟絶卻後四年多歿命荒疵越理莫此為甚夫人豈有一臟既絶尚活四年之理哉歷考內經而知代脈之義別自有説如宣明五氣篇曰脾脈代邪氣臟腑病形篇云黃者其脈代皆言藏氣之常候非謂代為止也平人氣象論曰長夏胃微軟弱曰平但代無胃曰死者蓋言無胃氣而死亦非以代為止也如雲五十動而不一代者是乃至數之代也若脈平勻而忽強忽弱者乃形體之代即平人氣象論所言者是也若脾旺四季而隨時更代者乃氣候之代即宣明五氣等篇所云者是也脈無定候更變不常則均謂之代各因其變而察其情庶足以窮其妙耳善化縣黃桂岩心疼奪食脈三動一止良久不能自還施笠澤云五臟之氣不至法當旦夕死余曰古人謂痛甚者脈多代周梅屋云少得代脈者死老得代脈者生今桂岩春秋高矣而胸腹負痛雖有代脈不足慮也果越兩旬而桂岩起矣故醫非博覽未易窮脈之變耳革脈陽中之陰體象革大弦急浮取即得按之乃空渾如鼓革主病革主表寒亦屬中虛左寸之革心血虛痛右寸之革金衰氣壅左關遇之疝瘕為祟右關遇之土虛為疼左尺之革精空可必右尺之革殞命為憂女人得之半産漏下按革者皮革之象也表邪有餘而內則不足也恰如鼓皮外則繃急內則空虛也浮舉之而弦大非繃急之象乎沉按之而豁然非中空之象乎惟表有寒邪故弦急之象見焉惟中虧氣血故空虛之象顯焉仲景曰革脈弦而芤弦則為寒芤則為虛虛寒相搏此名為革男子亡血失精女人半産漏下王叔和云三部脈革長病得之死卒病得之生李時珍云此芤弦二脈相合故均主失血之候諸家脈書皆以為即牢脈也故或有革無牢或有牢無革溷淆莫辨不知革浮牢沉革虛牢實形與症皆異也甲乙經云渾渾革至如湧泉病進而色弊綿綿其去如弦絶者死謂脈來渾濁革變急如泉湧出而不返也觀其曰湧泉則浮取之不止於弦大而且數且搏且滑矣曰弦絶則重按之不止於豁然而且絶無根蒂矣故曰死也王貺以為溢脈者自寸而上貫於魚際直衝而上如水之沸而盈溢也與革脈奚涉乎丹溪曰如按鼓皮其於中空外急之義最為親切之喻牢脈陰中之陽體象牢在沉分大而弦實浮中二候了不可得主病牢主堅積病在乎內左寸之牢伏梁為病右寸之牢息賁可定左關見牢肝家血積右關見牢陰寒痞癖左尺牢形奔豚為患右尺牢形疝瘕痛甚按牢有二義堅牢固實之義又深居在內之義故樹木以根深為牢蓋深入於下者也監獄以禁囚為牢深藏於內者也仲景曰寒則牢固又有堅固之義也沈氏曰似沉似伏牢之位也實大弦長牢之體也牢脈所主之症以其在沉分也故悉屬陰寒以其形弦實也故咸為堅積若夫失血亡精之人則內虛而當得革脈乃為正象若反得牢脈是脈與症相反可以卜死期矣偽訣云尋之則無按之則有但依稀倣佛卻不言實大弦長之形象是沉脈而非牢脈矣又曰脈入皮膚辨息難更以牢為死亡之脈矣其謬可勝言哉叔和脈經云牢脈似沉似伏實大而長微弦可謂明盡其狀至伏脈雖重按之亦不可見必推筋至骨乃見其形而牢脈既實大弦長才重按之便滿指有力矣又何以謂之似伏乎脈之義幽而難明非字字推敲展轉審辨能無遺後學之疑惑哉散脈體象散脈浮亂有表無里中候漸空按則絶矣主病散為本傷見則危殆左寸見散怔忡不寐右寸見散自汗淋漓左關之散當有溢飲右關之散脹滿蠱疾左尺見散北方水竭右尺得之陽消命絶按散有二義自有漸無之象亦散亂不整之象也當浮候之儼然大而成其為脈也及中候之頓覺無力而減其十之七八矣至沉候之杳然不可得而見矣漸重漸無漸輕漸有明乎此八字而散字之義得散脈之形確著矣故叔和云散脈大而散有表無里字字斟酌毫不苟且者也崔氏云渙漫不收蓋渙漫即浮大之義而不收即無根之義雖得其大意而未能言之鑿鑿也柳氏云無統紀無拘束至數不齊或來多去少或去多來少渙散不收如楊花散漫之象夫楊花散漫即輕飄而無根之説也其言至數不齊多少不一則散亂而不整齊嚴肅之象也此又補叔和未備之旨深得散脈之神者也戴同父云心脈浮大而散肺脈短澀而散皆平脈也心脈軟散而怔忡肺脈軟散為汗出肝脈軟散為溢飲脾脈軟散為胻腫皆病脈也腎脈軟散諸病脈見散皆死脈也古人以代散為必死者蓋散為腎敗之徵代為脾絶之候也腎脈本沉而散脈按之不可得見是先天資始之根本絶也脾脈主信而代脈歇至不愆其期是後天資生之根本絶也故二脈獨見均為危殆之候而二脈交見尤為必死之符芤脈陽中之陰體象芤乃草名絶類慈蔥浮沉俱有中候獨空主病芤脈中空故主失血左寸呈芤心主喪血右寸呈芤相傅陰傷芤入左關肝血不藏芤現右關脾血不攝左尺如芤便紅為咎右尺如芤火炎精漏按芤之為義兩邊俱有中央獨空之象也芤乃草名其狀與蔥無以異也假令以指候蔥浮候之著上面之蔥皮中候之正當蔥之空處沉候之又著下面之蔥皮以是審察則芤脈之名象昭然於心目之間確乎無可疑矣劉三點云芤脈何似絶類慈蔥指下成窟有邊無中叔和云芤脈浮大而軟按之中央空兩邊實二家之言其於芤脈已無遺蘊矣戴同父云營行脈中脈以血為形芤脈中空脫血之象也偽訣云兩頭有中間無以頭字易脈經之邊字未明中候獨空之旨則是上下之脈劃然中斷而成陰絶陽絶之診矣又云寸芤積血在胸中關裡逢芤腸胃癰是以芤為蓄血積聚之實脈非失血虛家之空脈矣以李時珍之博洽明通亦祖述其言為主病之歌豈非千慮之一失乎偽訣又云芤主淋瀝氣入小腸與失血之候有何干涉種種邪訛誤人不小不得不詳為之辨也即叔和脈經云三部脈芤長病得之生卒病得之死然暴失血者脈多芤而謂卒病得之死可乎其言亦不能無疵也至劉肖齋所引諸家論芤脈者多出附會不可盡信伏脈陰體象伏為隱伏更下於沉推筋著骨始得其形主病伏脈為陰受病入深伏犯左寸血鬱之症伏居右寸氣鬱之疴左關值伏肝血在腹右關值伏寒凝水穀左尺伏見疝瘕可驗右尺伏藏少火消亡按伏之為義隱伏而不見之謂也浮中二候絶無影晌雖至沉候亦不可見必推筋至骨方始得見耳故其主病多在沉陰之分隱深之處非輕淺之劑所能破其藩垣也在傷寒論中以一手脈伏為單伏兩手脈伏曰雙伏不可以陽症見陰脈為例也火邪內郁不得發越乃陽極似陰故脈伏者必有大汗而解正如久旱將雨必先六合陰晦一回雨後庶物咸蘇也又有陰症傷寒先有伏陰在內而外復感寒邪陰氣壯盛陽氣衰微四肢厥逆六脈沉伏須投薑附及灸關元陽乃復回脈乃復出也若太溪衝陽皆無脈者則必死無疑劉玄賓云伏脈不可發汗為其非表脈也亦為其將自有汗也乃偽訣云徐徐發汗而潔古欲以附子細辛麻黃湯發之皆非伏脈所宜也偽訣論形象則妄曰尋之似有定息全無是於中候見形矣在伏之名義何居乎疾脈陽體象疾為急疾數之至極七至八至脈流薄疾主病疾為陽極陰氣欲竭脈號離經虛魂將絶漸進漸疾旦夕殞滅左寸居疾弗戢自焚右寸居疾金被火乘左關疾也肝陰已絶右關疾也脾陰消竭左尺疾兮涸轍難濡右尺疾兮赫曦過極按六至以上脈有兩稱或名曰疾或名曰極總是急速之形數之甚者也是惟傷寒熱極方見此脈非他疾所恆有也若勞瘵虛憊之人亦或見之則陰髓下竭陽光上亢有日無月可與之決短期矣陰陽易病者脈常七八至號為離經是已登死籍者也至夫孕婦將産亦得離經之脈此又非以七八至得名如昨浮今沉昨大今小昨遲今數昨滑今澀但離於平素經常之脈即名為離經矣大都一息四至則一晝一夜約一萬三千五百息通計之當五十周於身而脈行八百一十丈此人身經脈流行之常度也若一呼四至則一日一夜周於身者當一百營而脈遂行一千六百餘丈矣必至喘促聲嘶僅呼吸於胸中數寸之間而不能達於根蒂真陰極於下孤陽亢於上而氣之短已極矣夫人之生死由於氣氣之聚散由乎血凡殘喘之尚延者只憑此一線之氣未絶耳一息八至之候則氣已欲脫而猶冀以草木生之何怪乎不相及也脈法總論脈狀頗多未可以二十八字盡之也然於表裡陰陽氣血虛實之義已能括其綱要矣如內經之所曰鼓者且浮且大也曰搏者且大且強也曰堅者實之別名也曰橫者洪之別名也曰急者緊之別名也曰喘者且浮且數也曰躁者且浮且疾也曰疏者且遲且軟也曰格者人迎倍大也曰關者氣口倍大也此二脈者後世不能深維內經之旨而誤作病名不知病因脈而得名也曰溢者自寸口上越魚際氣有餘也曰覆者自尺部下達臂間血有餘也如仲景論脈曰縱者水乘火金乘木也曰橫者火乘水木乘金也曰逆者水乘金火乘木也曰順者金乘水木乘火也曰反者來微去大病在裡也曰覆者頭小本大病在表也曰高者衛氣盛也陽脈強也曰章者營氣盛也陰脈強也曰綱者高章相搏也曰惵者衛氣弱也陽脈衰也曰卑者營氣弱也陰脈衰也曰損者惵卑相搏也內經十二仲景十二凡得二十四脈未嘗非辨證之旨訣而世皆置若罔聞則有慙於司命之職矣雖二十八脈亦已含藏諸義然不詳於二十四字之義又安能入二十八字之奧哉而猶不止此也陰陽不可不分而剖色脈不可不合而稽尺膚不可不詳而考主病不可不諳而識四者得而持脈之道思過半矣脈要精微論云微妙在脈不可不察察之有紀從陰陽始始之有經從五行生生之有度四時為宜彼春之暖為夏之暑彼秋之忿為冬之怒四變之動脈與之上下是以聖人持脈之道先後陰陽而持之若陽動陰靜陽剛陰柔陽升陰降陽前陰後陽上陰下陽左陰右數者為陽遲者為陰表者為陽里者為陰至者為陽去者為陰進者為陽退者為陰其恆經也或陰盛之極反得陽象或陽亢之極反得陰徵或陽窮而陰乘之或陰窮而陽乘之隨症更遷與時變易此陰陽之不可不分而剖也岐伯曰察脈動靜以視精明察五色觀五臟有餘不足六腑強弱形之盛衰以此參伍決死生之分又曰形氣相得謂之可治色澤以浮謂之易已脈從四時謂之可治脈弱以滑是有胃氣靈樞曰色脈與尺如鼓桴相應青者脈弦赤者脈鉤黃者脈代白者脈毛黑者脈石見其色而不得其脈反得相勝之脈則死矣得相生之脈則病已矣又曰精明五色者氣之華也赤欲如白裹朱不欲如赭白欲如鵝羽不欲如鹽青欲如蒼璧不欲如藍黃欲如羅裹雄黃不欲如黃土黑欲如重漆色不欲如地蒼此色脈之不可不合而稽也靈樞曰審尺之緩急大小滑澀肉之堅脆而病形定矣目窠微腫頸脈動時咳按之手足窅而不起風水膚脹也尺膚滑而淖澤者風也尺肉弱者解㑊安臥脫肉者寒熱不治尺膚澀者風痹也尺膚粗如枯魚之鱗者傷飲也尺膚熱甚脈盛躁者病溫也脈盛而滑者病且出也尺膚寒脈小者泄而少氣尺膚炬然寒熱也肘所獨熱者腰以上熱手所獨熱者腰以下熱肘後粗以下三四寸熱者腸中有蟲掌中熱者腹熱掌中寒者腹寒魚上有青脈者胃中寒尺炬然熱人迎大當奪血尺堅大脈小少氣悗有加立死又曰脈急者尺膚亦急脈緩者尺膚亦緩脈小者尺膚亦減而少氣脈大者尺膚亦賁而起脈滑者尺膚亦滑脈澀者尺膚亦澀此尺膚之不可不詳而考也脈要精微論曰長則氣治短則氣病數則煩心大則病進上盛則氣高下盛則氣脹代則氣衰細則氣少澀則心痛渾渾革至如湧泉病進而色弊綿綿其去如弦絶者死平人氣象論曰脈短者頭疼脈長者足脛痛脈促上擊者肩背痛脈沉而堅者病在中脈浮而盛者病在外脈沉而弱寒熱及疝瘕少腹痛脈沉而橫脅下有積腹中有橫積痛脈沉而喘曰寒熱脈盛滑堅者病在外脈小實而堅者病在內小弱以澀謂之久病浮滑而疾謂之新病脈急者疝瘕少腹痛脈滑曰風脈澀曰痹緩而滑曰熱中盛而緊曰脹臂多青脈曰脫血尺脈緩澀謂之解㑊安臥脈盛謂之脫血尺澀脈滑謂之多汗尺寒脈細謂之後泄尺脈粗常熱者謂之熱中此主病之不可不諳而識也如上所述不過大略耳若欲達變探微非精研靈素博綜百家不可也許胤宗曰脈之候幽而難明吾意所解口莫能宣也口且莫能宣而筆又烏能寫乎博極而心靈自啓思深而神明自通則三指有隔垣之照二豎無膏肓之遁矣
