body:
  text: 卷一脈之名義內經曰人受氣於谷谷入於胃以傳於肺五臟六腑皆以受氣清者為營濁者為衛營行脈中衛行脈外此明胃氣為脈道之根臟腑之本氣血之所由出也凡人之生皆受氣於谷萬物資生之本也凡谷之入必先至於胃萬物歸土之義也坤土不敢自專精微上輸於肺蓋地道卑而上行也肺為乾金所受精微下溉臟腑蓋天道下濟而光明也金土互輸地天交泰清而上升者為營血陰生於陽也濁而下降者為衛氣陽根於陰也營血為陰故行脈中衛氣為陽故行脈外也按審病察脈以決死生非指下了然將安所憑藉乎深慨世醫不知脈為何物若以為氣乎而氣為衛衛行脈外則知非氣矣若以為血乎而血為營營行脈中則知非血矣若以為經隧乎而經隧實繁則知非經隧矣然則脈果何物耶余嘗於此深思久而始悟其微古之脈字從血從𠂢謂氣血流行各有分派而尋經絡也今之脈字從肉從永謂胃主肌肉氣血資生而永其天年也夫人之生惟是精與神而已精氣即血氣而神則難見也人非是神無以主宰血氣保合太和流行三焦灌溉百骸故脈非他即神之別名也神超乎氣血之先為氣血之根蒂善乎華元化曰脈者氣血之先也氣血之先非神而何然神依於氣氣依於血血資於谷谷本於胃所以古之論脈者云有胃氣則生無胃氣則死東垣亦曰脈貴有神正指胃氣言也是知穀氣充則血旺血旺則氣強氣強則神昌神之昌與否皆以脈為徵兆故脈也者實氣血之先也先也者主宰乎氣血之神也脈即神之別名此千古未剖之疑義也特表而出之氣口獨以為五臟主黃帝問曰氣口何以獨為五臟主岐伯曰胃者水穀之海六腑之大源也五味入口藏於胃以養五臟氣氣口太陰也是以五臟六腑之氣味皆出於胃變見於氣口氣口者六部之總稱非專指右關之前也按素問經脈別論云食氣入胃經氣歸於肺肺朝百脈氣歸於權衡權衡以平氣口成寸以決死生由是知氣口即寸口也曰變見者飲食所變之精微皆顯見於手太陰之氣口而陰陽盛衰之象莫不從此見矣吳草廬曰兩手寸部俱名為氣口不僅言右寸肺脈為氣口者也難經曰十二經皆有動脈獨取寸口何謂也扁鵲曰寸口者脈之大會手太陰之動脈也肺為五臟六腑之華蓋位處至高受百脈之朝會布一身之陰陽故經曰臟真高於肺以行營衛陰陽者是也是以十二經皆有動脈獨取肺家一經之動脈可以見五臟六腑強弱吉凶之徵兆也脈辨至數內經曰人一呼脈再動一吸脈亦再動呼吸定息脈五動閏以太息命曰平人出氣曰呼入氣曰吸一呼一吸謂之一息動至也再動再至也常人之脈一呼兩至一吸亦兩至呼吸定息謂一息將盡而換息未起之際脈又一至故曰五動閏余也猶閏月之義言平和之脈若得五動即太過矣惟當太息之際亦為平脈何也凡人之呼吸三息後必閏以一息之長五息再閏謂之太息故曰閏以太息乃應歷家三歲一閏五歲再閏之數也此即平人不病之常度然則總計定息太息之間大約一息脈當六至故五十營篇曰呼吸定息脈行六寸乃合一至一寸也呼吸脈行丈尺凡晝夜五十度合一萬三千五百息五十營氣脈之數以應周天二十八宿人之經脈十二左右相同則為二十四脈加以蹺脈二任督脈二共二十八脈周身十六丈二尺以分晝夜也是為常度使五十營之數常周備無失則壽亦無窮故得盡天地之壽矣周行八百一十丈晝夜五十營之總數也一呼脈一動一吸脈一動曰少氣一呼一吸脈各一動則一息二至減於常人之半脈之遲者也遲主陰寒陽氣衰微也故曰少氣十四難謂之離經脈一呼脈三動一吸脈三動而躁尺熱曰病溫尺不熱脈滑曰病風脈澀曰痹若不因定息太息而呼吸各三動是一息六至矣難經亦曰離經躁者急疾之謂陽盛陰衰熱之象也尺熱言尺後近臂有熱則必通身皆熱脈來數躁而身有熱故知其病溫數滑而尺不熱陽邪內盛當病內風若使外感於風寧有尺不熱之理乎滑不澀也澀不滑也滑為血實氣壅澀為氣滯血少故當病痹一呼脈四動以上曰死脈絕不至曰死乍疏乍數曰死一呼四動則一息八至矣而況以上乎難經謂之奪精四至曰脫精五至曰死六至曰命盡是皆一呼四至以上也故死脈絕不至則元氣已竭乍疏乍數則陰陽敗亂無主三脈若見不死安待日夜五十營內經曰一日一夜五十營以營五臟之精不應數者命曰狂生營運也經脈運行於身一日一夜凡五十周以營五臟之精氣夫周身上下前後左右凡二十八脈其長十六丈二尺人之宗氣積於胸中主呼吸而行經隧一呼氣行三寸一吸氣行三寸呼吸定息氣行六寸以一息六寸推之則一日一夜凡一萬三千五百息通計五十周於身則脈行八百一十丈其有太過不及而不應此數者名曰狂生狂者妄也言幸而生也所謂五十營者五臟皆受氣持其寸口數其至也五十營者五臟所受之氣也持診也但診寸口而數其至則臟腑之衰旺可知也五十動而不一代者五臟皆受氣代者止而復來也蓋臟有所損則氣有所虧故不能運行也若五十動而無止者則終無止矣五臟之氣皆足和平之脈也四十動而一代者一臟無氣難經曰吸者隨陰入呼者因陽出今吸不能至腎至肝而還故知一臟無氣者腎氣先盡也然則五臟和者氣脈長五臟病者氣脈短觀此一臟無氣必先乎腎如下文所謂二臟三臟四臟五臟者皆當自遠而近以次而短則由腎及肝由肝及脾由脾及心由心及肺凡病將危者必氣促似喘僅呼吸於胸中數寸之間蓋其真陰絕於下孤陽浮於上此氣短之極也庸工於此而尚欲平之散之未有不隨撲而滅者良可悲也夫人之生死由乎氣氣之聚散由乎陰而殘喘得以尚延者賴一線之氣未絕耳此臟氣之不可不察也如此三十動而一代者二臟無氣二十動一代者三臟無氣十動一代者四臟無氣不滿十動一代者五臟無氣予之短期要在終始予猶與也短期死期也言死期已近也終始者十二經各有絕氣先見是名為始也詳見靈樞經脈篇所謂五十動而不一代者以為常也以知五臟之期予之短期者乍數乍疏也以為常者無病之常脈也因此可以知五臟之氣若欲決其死期則在乍數乍疏也不滿十至而代則乍數乍疏矣非代脈之外別有乍數乍疏也診貴平旦內經曰診法常以平旦陰氣未動陽氣未散飲食未進經脈未盛絡脈調勻氣血未亂乃可診有過之脈平旦者陰陽之交也營衛之氣一晝夜五十周於身晝則行陽夜則行陰迨至平旦復會於寸口斯時也平旦初寤之時陰氣將退而未退陽氣將盛而未散飲食未進穀氣未行故經脈未盛而絡脈調勻氣血未至於擾亂乃可診有過之脈有過猶言有病也若飲食入胃則穀氣流行直行之經往往強盛而橫行之絡氣先至者強氣未至者弱經絡之脈不能調勻則氣血之盛衰未可盡憑矣寸關尺之義增補內經曰從魚際至高骨卻行一寸名曰寸口從寸至尺名曰尺澤故曰尺寸寸後尺前名曰關大指從魚際穴至高骨得一寸故名為寸也肘腕內廉尺澤穴至高骨得一尺故名為尺也正當高骨之上乃尺與寸交界之際故名為關也其義豈苟哉扁鵲曰尺寸者脈之大要會也從關至尺是尺內陰之所治也從關至魚際是寸口內陽之所治也要者扼要也會者朝會也尺寸皆肺之經脈百脈皆來朝會豈非扼要之所乎腎肝為陰處乎尺內心肺為陽處乎寸內治猶屬也言所屬之位也岐伯曰人有三部部有三候以決死生以處百病以調虛實而除邪疾三部上中下也三候天地人也上古診脈不獨寸口於諸經之動脈皆診之此云三部九候也可見扁鵲之三部九候大非經旨明矣帝曰何謂三部岐伯曰有上部有中部有下部部各有三候三候者有天有地有人上部天兩額之動脈上部地兩頰之動脈上部人耳前之動脈中部天手太陰也中部地手陽明也中部人手少陰也下部天足厥陰也下部地足少陰也下部人足太陰也故下部之天以候肝地以候腎人以候脾胃之氣帝曰中部三候奈何岐伯曰亦有天亦有地亦有人天以候肺地以候胸中之氣人以候心帝曰上部以何候之岐伯曰亦有天亦有地亦有人天以候頭角之氣地以候口齒之氣人以候耳目之氣三部者各有天各有地各有人三而成天三而成地三而成人三而三之合則為九以此推之經文明指人身上中下動脈各有所候以診諸臟之氣非獨以寸口為言也如仲景脈法上取寸口下取趺陽正是此意難經所云三部者寸關尺九候者浮中沉乃只以寸口而分三部九候之診後世言脈者皆宗之雖為捷法不無背謬經旨乎按扁鵲曰上部法天主胸以上至頭之有疾中部法人主膈以下至臍之有疾下部法地主臍以下至足之有疾仍宗經旨上竟上下竟下之義但九候之說以寸關尺之三部而分浮中與沉之三候得無又謬乎若以扁鵲之說為是則軒岐之說為非軒岐之說為是則扁鵲之說為非矣故不得不置一喙於其間也浮之與沉固無庸議矣中則止有浮之中耳奚能有沉之中乎浮而無中固曰無根沉則必無中矣何僅以為沉脈主裡而全無必死之症乎蓋人但知有中正之中而不知有中和之中經云真臟脈見者死脈無胃氣者謂為真臟脈也是除諸怪脈之外皆得謂之有中脈耳何棄其彰明較著之經文而反以浮中與沉索摸於不可知之陋習乎此事之不可解者也況診脈之法或以手測或以目視而非僅從事於指按也史稱扁鵲以診脈為名而倉公仲景以下有不競趨於名者哉沿襲至今而訛以傳訛為其所紛更者愈多矣余嘗尋繹經文得其旨趣人迎止隸於喉旁三部須兼乎手足臟則候之於左手腑則候之於右手寸以候上尺以候下臟腑皆然庶不使有纖毫之疑而熒惑於其間也彼七表八里九道之紛紜智又出扁鵲下矣世多識之故不贅焉按內經以三部各有天地人三而三之為九候上中下不定乎寸部之位與扁鵲之寸上關中尺下不同上部俱定於頭面兩額之動脈即下文天以候頭角之氣動應於指此脈在額兩旁瞳子窌骨空處人以候兩頰之動脈即聽會穴等分地以候口齒之氣動應於指此脈在鼻孔下旁近巨窌穴之分是則面部不獨色診且脈診矣脈診則仍用七診可以知頭面之詳矣獨大獨小獨疾獨遲獨熱獨寒獨陷下也中部之三候俱以寸診其地候胸中之氣則氣口也本經經脈篇所謂行氣於府即膻中氣海穴也下部之天候於關之肝地候於尺之腎人候於脾胃之氣三部之候天位乎上人位乎中地位乎下獨下部人候反在天之上者天氣下降接乎地之陰氣此地中之天人高於地即高乎地中之天矣三部以頭候頭之屬以手候臟腑之屬不及臍以下至足者以足之四經腎主骨肝主筋脾主四肢胃主宗筋與腎相連並筋骨主之矣是則手候臟腑之屬並及臍以下至足以諸脈皆繫於手足諸經足之脈亦連於手上廉下廉前廉後廉之類是也不可泥頭候頭之屬遂泥當以手候手之屬足候足之屬也乃本篇之後復申言之云以左手足上去踝五寸按之庶右手足當踝而彈之其應過五寸以上蠕蠕然者不病其應疾中手渾渾然者病中手徐徐然者病蠕蠕微動貌渾渾不清貌徐徐緩而遲也其應不能至五寸彈之不應者死此經文彈按乃是刺法與診脈互相發明其理手踝之上手太陰肺經脈也應於中部去踝五寸手踝骨在下從內廉至太淵計有五寸足踝之上足太陰脾經脈也應於下部去內踝骨之上五寸乃三陰交之上漏谷之下也蓋漏谷去踝六寸乃是則中部之三候舉一手太陰而可概其餘手太陰者百脈之所會大中之中故應中部下部之三候舉一足太陰而可概其餘足太陰陰土也陰之與土其氣俱下故應下部按而彈手足踝者所以盡兩太陰脈之量周悉無遺也故可取之察吉凶也諸脈獨於兩太陰脈加意者太陰屬坤坤為胃手太陰之中部天而即統乎中部之地與人貴天之中也是太陰之下部人而即統乎下部之天與地貴人之中也天人之際得中而地道自寧不必揭地之中且以知天人之中即胃之中即地之中也內經之旨精奧淵微非神聖不能窮其理故扁鵲以寸關尺配上中下猶未盡然也滑伯仁曰診脈之道先調自己氣息男左女右先以中指取定關位卻下前後二指初輕候消息之次中候消息之次重候消息之自寸關至尺逐部尋究一呼一吸之間脈行四至為率閏以太息五至為平脈也其有太過不及則為病脈各以其部斷之自己之氣息調勻則他脈之至數明辨故凡診必先調息也男子屬陽故先診左手女子屬陰故先診右手也先以中指取定關部然後下前後二指則尺寸方准也輕候消息其名曰舉中候消息其名曰尋重候消息其名曰按一息四至為和平之脈若當太息必以五至為和平也太過者洪大有力不及者遲細無力也各以五臟六腑察其微甚審其從違斷其吉凶生死之法如此也又曰臂長則疏下指臂短則密下指三部之內大小浮沉遲數同等尺寸陰陽高下相符男女左右強弱相應四時之脈不相戾命曰平人其或一部之內獨大獨小獨疾獨遲左右強弱之相反四時男女之相背皆病脈也左手不和為病在表為陽主四肢右手不和為病在裡為陰主腹臟臂長脈亦長故下指宜疏臂短脈亦短故下指宜密同等者不大不小不浮不沉不遲不數也相符者寸為陽為高宜浮大尺為陰為下宜沉小也相應者左大順男右大順女男子寸盛而尺弱女子尺盛而寸弱也不相戾者春弦夏洪秋毛冬石也此四脈者平人無病之脈也其或大小獨見遲數偏呈左右相反時令相戾男女相違皆知其為病脈也左屬陽陽在表與四肢相應右屬陰陰在裡與腹臟相應也余可類推又曰察脈須識上下來去至止六字不明此則陰陽虛實不別也上者為陽下者為陰來者為陽去者為陰至者為陽止者為陰也上者自尺部上於寸口陽生於陰也下者自寸口下於尺部陰生於陽也來者自骨肉之分而出於皮膚之際氣之升也去者自皮膚之際而還於骨肉之分氣之降也應曰至息曰止也上下者以尺與寸相比度也陽生於陰者左尺水生左關木左關木生左寸心火也右尺火生右關土右關土生右寸肺金也陰生於陽者右寸肺金生左尺腎水左寸君火分權於右尺相火也來者為氣之升主乎陽也去者為氣之降主乎陰也內經以來盛去衰為鉤脈陽氣盛滿之象若去來皆盛鉤之太過也來不盛去反盛鉤之不及也應者尋常應手之脈也止者歇至不勻之脈也如促結澀代之類是矣三焦分配三部岐伯曰寸以候上焦關以候中焦尺以候下焦扁鵲曰三焦者元氣之別使也主通行於三氣經歷於五臟六腑華元化曰三焦者人身三元之氣也總領五臟六腑營衛經絡內外左右上下之氣也按三說而細繹之乃知脈本身中之元神和會後天穀氣以周流於一身者也蓋元神附於腎間之動氣出於下焦合水穀之精氣謂之營氣升於中焦合水穀之悍氣謂之衛氣升於上焦營行脈中衛行脈外其宗氣積於胸中名曰氣海故三焦者統領周身之氣而分隸於胸膈腹即分配於寸關尺灼然無可疑者乃伯仁亦承訛襲舛而謂右尺云手心主三焦脈所出何其不稽於古不衷於理耶重輕審察扁鵲曰初持脈如三菽之重與皮毛相得者肺部也如六菽之重與血脈相得者心部也如九菽之重與肌肉相得者脾部也如十二菽之重與筋平者肝部也按之至骨舉指來疾者腎部也由是推之不獨以左右六部分候臟腑即指下輕重之間便可測何經受病矣粗工不察於此而專分六部則脈中之微妙豈在是可盡其蘊耶陰陽辨別岐伯曰言人之陰陽則外為陽內為陰言人身之陰陽則背為陽腹為陰言人身臟腑中陰陽則臟為陰腑為陽肝心脾肺腎五臟為陰膽胃大小腸三焦膀胱六腑為陽故背為陽陽中之陽心也陽中之陰肺也腹為陰陰中之陰腎也陰中之陽肝也陰中之至陰脾也此言陰陽表裡內外雌雄相輸應也心肺皆居上而屬陽但心位乎南故為陽中之陽肺位乎西故為陽中之陰也腎肝皆處乎下而屬陰但腎位乎北故為陰中之陰肝位乎東故為陰中之陽也脾土位卑為陰且為孤臟而居乎內又不主時令而寄旺於四季之末故為陰中之至陰也扁鵲曰呼出心與肺吸入腎與肝呼吸之間脾受穀氣也其脈在中浮者陽也沉者陰也心肺俱浮何以別之然浮而大散者心也浮而短澀者肺也腎肝俱沉何以別之然牢而長者肝也舉之濡按之來實者腎也脾主中州故其脈在中是陰陽之法也呼出者陽也故心肺之脈皆浮也心為陽中之陽故浮而且大且散也肺為陽中之陰故浮而兼短澀也吸入者陰也故腎肝之脈皆沉也腎為陰中之陰故沉而且實也肝為陰中之陽故沉而兼長也脾為中州故不浮不沉而脈在中也內經分配臟腑定位素問脈要精微論曰尺內兩旁則季脅也季脅小肋也在脅下兩旁為腎所近之處也尺外以候腎尺裡以候腹尺外者尺脈前半部也前以候陽後以候陰背為陽腎附背故外以候腎腹為陰故里以候腹所謂腹者凡大小腸膀胱命門皆在其中矣以下諸部俱言左右而此獨不分者以兩尺皆主乎腎也中附上左外以候肝內以候膈中附上者言附尺之上而居乎中即關脈也左外者言左關之前半部也內者言左關之後半部也肝為陰中之陽而亦附近於背故外以候肝內以候膈舉一膈則中焦之膈膜膽腑皆在其中矣右外以候胃內以候脾右關之前所以候胃右關之後所以候脾脾胃皆中州之官而以表裡言之則胃為陽脾為陰故外以候胃內以候脾也按寸口者手太陰也太陰行氣於三陰故曰三陰在手而主五臟所以本篇止言五臟而不及六腑然胃亦腑也而此獨言之何也經所謂五臟皆稟氣於胃胃者五臟之本也臟氣者不能自致於手太陰必因於胃氣乃至於手太陰也故胃氣當於此察之又五臟別論云五味入口藏於胃以養五臟氣氣口亦太陰也是以五臟六腑之氣味皆出於胃變見於氣口然則此篇雖止言胃而臟腑之氣亦無不見乎此矣上附上右外以候肺內以候胸中上附上者言上而又上則寸脈也五臟之位惟肺最高故右寸之前以候肺右寸之後以候胸中胸中者膈膜之上皆是也左外以候心內以候膻中心肺皆居膈上故左寸之前以候心左寸之後以候膻中膻中者心包絡之別名也按五臟所居之位皆五行一定之理火旺於南故心居左寸木旺於東故肝居左關金旺於西故肺居右寸土旺於中而寄位西南故脾胃居右關此即河圖五行之次序也前以候前後以候後此重申上下內外之義也統而言之寸為前尺為後分而言之上半部為前下半部為後蓋言上以候上下以候下也上竟上者胸喉中事也下竟下者少腹腰股膝脛足中事也竟盡也言上而盡於上在脈則盡於魚際在體則應乎胸喉也下而盡於下在脈則盡於尺部在體則應乎少腹腰膝足也按此章首言尺次言中附上而為關又次言上附上而為寸皆自內以及外者蓋以太陰之脈從胸走手以尺為根本寸為枝葉也故曰凡人之脈寧可有根而無葉不可有葉而無根又按內外二字諸家之注皆云內側外側若以側為言必脈形扁闊矣或有兩條亦可耳不然則於義不通矣如前以候前後以候後上竟上下竟下者皆內外之義也觀易卦六爻自下而上以上三爻為外卦下三爻為內卦則上下內外之義昭然矣或曰浮取乎外沉取乎內於義亦通然如外以候肺內以候胸中外以候心內以候膻中是臟從外取而腑從內候則無是事矣故不如從上下看為穩當也推而外之內而不外有心腹積也推者察也求也凡診脈必先推求於外若但見沉脈而無浮脈是有內而無外矣故知其病心腹之有積也推而內之外而不內身有熱也推求於內浮而不沉則病在外而非內矣惟表有邪故身有熱也推而上之上而不下腰足清也清者冷也推求於上部則脈強盛下部則脈虛弱此上盛下虛故腰足清冷也上下有二義以寸關尺言之寸為上尺為下也推而下之下而不上頭項痛也推求於下部下部有力上部無力此清陽不能上升故頭項痛或陽虛而陰湊之亦頭項痛也按之至骨脈氣少者腰脊痛而身有痹也按之至骨腎肝之分也脈氣少者言無力也腎水虛故腰脊痛肝血虧故身有痹痛也按五臟六腑以暨心包絡共成十二經分配於脈之六部自有定理莫可變亂第詳玩內經便昭然於心目矣內經出胸膈腹三字以分上中下而配寸關尺也然腑不及膽者寄於肝部也不及大小腸膀胱者統於腹中也高陽生以大小腸列於寸上不知大小腸皆在下焦腹中乃欲越中焦而候之寸上誤矣彼不過因小腸脈絡於心大腸脈絡於肺耳然則腎之脈亦絡於心而遂以左寸候腎可乎膻中為手厥陰經即心包絡也故經曰左外以候心內以候膻中外上也內下也義見上文注中又曰膻中者心主之宮城也又曰心包絡之脈起於胸中出屬心即此三段經文而細繹之則膻中即是心包心包實為心府昭確可據而高陽生候於右尺不亦妄乎以丹溪之敏亦以包絡膻中分為二候況其他哉內經明稱左右皆腎而命門居兩腎之中考明堂銅人等經命門一穴在督脈第十四椎下陷中兩腎之間且脈之應於指下為有經絡循經絡朝會於寸口而內經並無命門之經絡妄以穴名為臟配列右尺真是矇昧千秋矣三焦者中清之府通行人身三元之氣三焦通則周身之氣皆通故經曰上焦如霧中焦如漚下焦如瀆王叔和分配於寸關尺乃至當也而高陽生分隸於右尺尤為謬妄下文重言以申明之經曰尺內兩旁則季脅也尺外以候腎尺裡以候腹中附上左外以候肝內以候膈右外以候胃內以候脾上附上右外以候肺內以候胸中左外以候心內以候膻中此內經三部之候法也腑不及膽者寄於肝也不及大小腸膀胱者統於腹中也至高陽生偽訣以大小腸列於寸上以三焦配於左尺以命門列於右尺及厥陰膻中竟置而不言又男女易位故不可不為之辨夫寸主上焦以候胸中關主中焦以候膈中尺主下焦以候腹中此一身之定位古今之通論也大小腸皆在下焦腹中偽訣越中焦而候之寸部有是理乎伯仁見及於此以左尺主小腸膀胱前陰之病右尺主大腸後陰之病可稱千古隻眼偽訣之誤特因心與小腸為表裡肺與大腸為表裡不知經絡相為表裡診候自有定位何可混耶叛經者一也靈樞曰上焦出於胃上口並咽以上貫膈而布胸中中焦亦並胃中出上焦之後泌糟粕蒸津液化精微而為血下焦者別迴腸注於膀胱而滲入焉水穀者居於胃中成糟粕下大腸而為下焦又曰上焦如霧中焦如漚下焦如瀆由是則明以上中下分三焦矣偽訣列於左尺不亦妄乎又曰密理厚皮者三焦厚粗理薄皮者三焦薄又曰勇士者三焦理橫怯士者三焦理縱由是則有形象矣偽訣以為無形不亦妄乎叛經者二也素問曰肝心脾肺腎五臟為陰膽胃大小腸三焦膀胱六腑為陽此止十一經耳則手厥陰一經竟何在乎又曰心者君主之官神明出焉肺者相傅之官治節出焉肝者將軍之官謀慮出焉膽者中正之官決斷出焉膻中者臣使之官喜樂出焉脾胃者倉廩之官五味出焉大腸者傳導之官變化出焉小腸者受盛之官化物出焉腎者作強之官伎巧出焉三焦者決瀆之官水道出焉膀胱者州都之官津液藏焉氣化則能出矣蓋以膻中足十二經之數則配手厥陰經者實膻中也及靈樞敘經脈又有包絡而無膻中然曰動則喜笑不休正與喜樂出焉之句相合夫喜笑者心火所司則知膻中與心應即包絡之別名也靈樞邪客篇曰心者五臟六腑之大主其臟堅固邪弗能容容之則心傷心傷則神去神去則死矣故諸邪之在心者皆在心之包絡獨膻中稱臣使者君主之親臣也由是察之包絡即為膻中斷無可疑膻中以配心臟自有確據乃偽訣竟不之及則手厥陰為虛懸之位矣叛經者三也心肝脾肺俱各一候惟腎臟而分兩尺之候者為腎有兩枚形如豇豆分列於腰脊之左右也刊誤以兩尺候腎深合經旨難經脈訣俱以左尺候腎水右尺候命門相火誤矣考明堂等經命門一穴在督脈第十四椎下陷中兩腎間雖兩腎水臟而相火寓焉蓋一陽居二陰之間所以成乎坎也獨不思脈之應於指下者為有經絡循經朝於寸口詳考內經並無命門之經絡也既無經絡何以應診而可列之右尺乎雖然左陽右陰天之常也左水右火地之理也兩尺之脈左尺主腎中之真陰右尺主腎中之真陽不可以左為腎右為命門也要知命門總主乎兩腎者也右尺診相火亦通六氣分合六部時日診候之圖此六氣分合六部時日診候之圖乃余所自悟而自制實六氣至理而古今所未發者以平治之紀為例若太過之紀其氣未至而至從節前十三日為度不及之紀其氣至而未至從節後十三日為度太過之歲從左尺浮分起立春不及之歲從左關中分起立春依次而推之必於平旦陰氣未散陽氣未動飲食未進衣服未著言語未吐之時清心調息逐部細究則時令之病可以前知診得六部俱平則已若有獨大獨小獨浮獨沉獨長獨短與各部不同依圖斷之無不驗者假如左關中候脈獨弦大已知雨水後驚蟄邊有風熱之病蓋弦主風而大主熱也且左關又為風木之令故也如右尺沉候脈獨緩滯而實大已知芒種後夏至邊有濕熱之病蓋緩滯主濕而實大主熱也若緩滯而虛大乃濕熱相火為患蓋緩滯為濕而虛大為相火也且在沉分沉亦主濕又在相火之位故也久病之人六脈俱見獨滯惟右寸中候脈來從容和緩清淨無滯已知霜降後立冬邊必愈蓋中候而從容和緩為胃氣之佳脈且右寸為肺金之位土來生金故也其餘各部俱仿此而細推之百不失一也然亦須三四候之確然不渝無不驗者下文重言以申明之政運有不應之脈不應者沉細之脈也甚至極沉極細幾於不可見矣第覆病者之手而診之則見凡值此不應之脈乃歲運合宜命曰天和之脈不必求治若誤治之反伐天和矣土運為南政蓋土位居中面南行令故也金木水火四運皆以臣事之北面受令故為北政甲己二年為土運南政南政之年南面行令故其氣在南所以南為上而北為下故寸為上而尺為下司天在上在泉在下人氣應之左右皆同脈有不應者謂陰之所在脈乃沉細不應本脈也陰者言六氣有三陰三陽而三陰之位則少陰居中太陰居左厥陰居右脈之不應乃以三陰之中而以少陰所居之處言之又分南北二政定其上下也如遇少陰司天則兩寸不應厥陰司天則右寸不應太陰司天則左寸不應如少陰在泉則兩尺不應厥陰在泉則右尺不應太陰在泉則左尺不應乙丙丁戊庚辛壬癸八年皆為北政北政之年北面受令其氣在北所以北為上而南為下在泉應上司天應下人氣亦應之故尺應下而寸應上如遇少陰司天則兩尺不應厥陰司天則右尺不應太陰司天則左尺不應如少陰在泉則兩寸不應厥陰在泉則右寸不應太陰在泉則左寸不應如尺當不應而反浮大寸當浮大而反沉細寸當不應而反浮大尺當浮大而反沉細是為尺寸反經曰尺寸反者死如右當不應而反浮大左當浮大而反沉細左當不應而反浮大右當浮大而反沉細是謂左右交經曰左右交者死人迎氣口增補黃帝曰寸口主中人迎主外兩者相應俱往俱來若引繩大小齊等又曰三陽在頭三陰在手靈樞曰氣口候陰人迎候陽寸口者即氣口也手太陰肺脈也故主在中之病人迎脈在結喉兩旁一寸五分陽明胃脈也故主在外之病蓋太陰行氣於三陰陽明行氣於三陽診三陽之氣於人迎診三陰之氣於氣口所謂相應者往來大小若引繩之不爽也故龐安常謂人迎氣口有喉手引繩之義以脈經以左為人迎右為氣口竟置陽明胃脈於烏有大非經旨況三陽在頭三陰在手其義亦謬人迎謂足陽明之脈不可以言於手明矣然上古診法有三一取三部九候以診通身之脈一取太陰陽明以診陰陽之脈一取左右氣口以診臟腑之氣張介賓曰初見脈經左為人迎右為氣口不無搖惑未敢遽辨及見綱目之釋人迎氣口亦云人迎在結喉兩旁足陽明之脈也又見龐安常論脈曰何謂人迎喉旁取之近又見徐東皋曰脈經以左手關前一分為人迎誤也若此者皆覺吾之先覺矣茲特引而正之嗚呼一言之舛遺誤千載以此授受何時復正哉立言者可不知詳慎考訂乎不若吳草廬之兩手俱名為氣口者無弊也所以內經云五臟六腑之氣味皆出於胃變見於氣口氣口即寸口也臟腑陰陽之盛衰莫不由此而徵見也明矣春夏人迎微大秋冬氣口微大如是者命曰平人春夏主陽故人迎之陽脈微大秋冬主陰故氣口之陰脈微大微大者猶言略大也雷公曰病之益甚與其方衰如何黃帝曰內外皆在焉言表裡俱當審察也切其脈口滑小緊以沉者病益甚在中人迎脈大緊以浮者病益甚在外益甚言病進也脈口即太陰氣口也故曰在中主臟人迎陽明腑脈也故曰在外主腑脈口滑小緊沉者陰分之邪也人迎大緊以浮者陽分之邪也故皆益進日甚脈口浮滑者病日進人迎沉滑者病日損脈口為陰浮滑者以陽加陰故病日進人迎為陽沉滑者陽邪漸退故病日損漸自減也脈口滑以沉者病日進在內人迎滑盛以浮者其病日進在外脈口人迎經分表裡故其滑沉滑浮而病日進者有在內在外之別也脈之浮沉及人迎與寸口脈小大等者病難已人迎氣口之脈其浮沉大小相等者非偏於陽則偏於陰故病難已按禁服篇曰春夏人迎脈微大秋冬寸口微大如是者命曰平人其義則可知病之在臟沉而大者易已小為逆病在腑浮而大者易已病在臟者為陰陰本當沉而大為陽氣充也故易已若見小脈則真陰衰而為逆矣病在腑者為陽陽病得陽脈為順故浮而大者病易已故曰陰症見陽脈者生陽症見陰脈者死人迎盛堅者傷於寒氣口盛堅者傷於食人迎主表盛堅為外感傷寒氣口主裡盛堅為內傷飲食此古法也今則止用寸口診法不為不妙然本無以左右分內外之理自叔和始以左為人迎右為氣口其失表裡之義久矣脈分四時六氣十二月大寒至二月春分為初之氣厥陰風木主令經曰厥陰之至其脈弦春分至小滿為二之氣少陰君火主令經曰少陰之至其脈鉤小滿至六月大暑為三之氣少陽相火主令經曰少陽之至大而浮大暑至八月秋分為四之氣太陰濕土主令經曰太陰之至其脈沉秋分至十月小雪為五之氣陽明燥金主令經曰陽明之至短而澀小雪至十二月大寒為六之氣太陽寒水主令經曰太陽之至大而長脈分四方東極之地四時皆春其氣暄和民脈多緩南極之地四時皆夏其氣蒸炎民脈多軟西極之地四時皆秋其氣清肅民脈多勁北極之地四時皆冬其氣凜冽民脈多石東南卑濕其脈軟緩居於高巔亦西北也西北高燥其脈剛勁居於汙澤亦東南也南人北脈取氣必剛北人南脈取氣必柔東西不齊可以類剖脈分五臟肝脈弦心脈鉤脾脈代肺脈毛腎脈石五臟平脈肝脈來軟弱招招如揭長竿末梢曰肝平招招猶迢迢也揭高舉也高揭長竿梢必和緩乃弦長而兼和緩柔軟之象也心脈來累累如連珠如循琅玕曰心平連珠琅玕皆狀其盛滿流行而無太過不及之弊也脾脈來和柔相離如雞踐地曰脾平和柔者悠悠揚揚也相離者不模糊也如雞踐地喻其緩而不迫胃氣之妙也肺脈來厭厭聶聶如落榆莢曰肺平厭厭聶聶澀之象也如落榆莢毛之象也輕浮和緩為和平之象腎脈來喘喘累累如鉤按之而堅曰腎平喘喘累累如鉤此三者皆心脈之陽也而濟之以沉石則陰陽和平也五臟病脈肝脈來盈實而滑如循長竿曰肝病盈實而滑弦之太過也長竿無梢則失其和緩之意此弦多胃少故肝病心脈來喘喘連屬其中微曲曰心病喘喘連屬急數之象其中微曲則尚未至於全曲鉤多胃少之象也脾脈來實而盈數如雞舉足曰脾病實而盈數如雞之舉足雖不能如踐地之和亦不至如鳥距之疾弱多胃少之象也肺脈來不上不下如循雞羽曰肺病不上不下澀之象也如循雞羽浮之象也毛多胃少肺金之病將見也腎脈來如引葛按之益堅曰腎病引葛者牽連引蔓之象也按之益堅則石多胃少腎病將見也五臟死脈肝脈來急益勁如新張弓弦曰肝死曰勁曰急強急不和比之新張弓弦絕無胃氣矣安得不死心脈來前曲後居如操帶鉤曰心死前曲者輕舉而堅大也後居者重按而牢實也操帶鉤者狀其彈指之象也但鉤無胃者其死必矣脾脈來銳堅如鳥之喙如鳥之距如屋之漏如水之流曰脾死鳥喙者狀其硬也鳥距者狀其急也屋漏者亂也水流者散也沖和之氣全無中州之官已絕矣肺脈來如物之浮如風吹毛曰肺死如物之浮則無根矣如風吹毛則散亂矣但毛無胃則肺氣絕矣腎脈來發如奪索辟辟如彈石曰腎死索而曰奪則互引而疾急矣石而曰彈則堅勁而無倫矣但石無胃故曰腎死按難經十五難與內經不同或內經有而難經缺或難經有而內經無然難經本以內經為宗不知何以異同乃爾學者惟當以內經為主無多岐之惑也五臟真脈真脈真臟脈也即死脈也文有異同義無差別總之不見胃氣之脈乃名真臟脈真肝脈至中外急如循刀刃責責然如按琴瑟弦真心脈至堅而搏如循薏苡子累累然真脾脈至弱而乍數乍疏真肺脈至大而虛如毛羽中人膚真腎脈至搏而絕如彈石狀辟辟然按凡持真臟脈者肝至懸絕十八日死心至懸絕九日死肺至懸絕十二日死腎至懸絕七日死脾至懸絕四日死脈以胃氣為本春胃微弦曰平弦多胃少曰肝病但弦無胃曰死夏胃微鉤曰平鉤多胃少曰心病但鉤無胃曰死長夏胃微軟弱曰平弱多胃少曰脾病但弱無胃曰死秋胃微毛曰平毛多胃少曰肺病但毛無胃曰死冬胃微石曰平石多胃少曰腎病但石無胃曰死蔡氏曰不大不小不長不短不滑不澀不浮不沉不疾不遲應手中和意思欣欣難以名狀者胃氣脈也脈貴有神東垣曰有病之脈當求其神如六數七極熱也脈中有力即有神矣為泄其熱三遲二敗寒也脈中有力即有神矣為去其寒若數極遲敗脈中不復有力為無神也而遽泄之去之神將何依耶故經曰脈者氣血之先氣血者人之神也按王宗正曰診脈之法當從心肺俱浮腎肝俱沉脾在中州即王氏之言而知東垣所謂脈中有力之中蓋指中央戊己土正在中候也胃氣未散雖數不至於極遲不至於敗尚可圖也故東垣之所謂有神即內經之所謂有胃氣也神門脈兩手尺中乃神門脈也王叔和云神門訣斷兩在關後人無二脈病死不救詳考其論腎之虛實俱於尺中神門以後驗之蓋水為天一之元萬物賴以資始者也故神門脈絕先天之根本既絕決無回生之日也而脈訣謂為心脈者誤矣彼因心經有穴名神門正在掌後兌骨之端故錯認耳殊不知心在上焦豈有候於尺中之理乎反關脈脈不行於寸口由列缺絡入臂後手陽明大腸經也以其不正行於關上故曰反關必反其手而診之乃可見也衝陽太谿太衝增補衝陽者胃脈也一曰趺陽在足面大指間五寸骨間動脈是也凡病勢危篤當診衝陽以驗其胃氣之有無蓋土為萬物之母資生之本也故經曰衝陽絕死不治太谿者腎脈也在足內踝後跟骨上陷中動脈是也凡病勢危篤當候太谿以驗其腎氣之有無蓋水為天一之元資始之本也故經曰太谿絕死不治太衝者肝脈也在足大指本節後二寸經曰診病人太衝脈有無可以決死生難經曰上部有脈下部無脈其人當吐不吐者死男女脈異增補朱丹溪曰昔者軒轅使伶倫截嶰谷之竹作黃鐘律管以候天地之節氣使岐伯取氣口作脈法以候人之動氣故黃鐘之數九分氣口之數亦九分律管具而寸之數始形故脈之動也陽得九分陰得一寸吻合於黃鐘天不足西北陽南而陰北故男子寸盛而尺弱肖乎天也地不滿於東南陽北而陰南故女子尺盛而寸弱肖乎地也黃鐘者氣之先兆故能測天地之節候氣口者脈之要會故能知人命之死生世之俗工誦高陽生之偽訣欲以治疾其不殺人也幾希參黃子曰男子陽為主兩寸常旺於尺女於陰為主兩尺常旺於寸乃其常也反之者病按褚澄尊生經男脈一如叔和女則左手寸命門三焦關脾胃尺肺大腸右手寸腎膀胱關肝膽尺心小腸男尺常弱初生微渺之氣也女尺常強太陽心火之位也遍考諸家褚論為精男女陰陽之分妊則男抱母女背母溺則男面覆女面仰男命系腎衰自下始故小腹先垂女命系乳衰自上始故乳房先槁而男女尺寸盛弱肖乎天地越人以為男生於寅女生於申三陰從地長三陽從天生謬之甚也獨丹溪惟本律法混合天人而闢之使千載之下一旦昭然豈不韙哉脈經曰左大順男右大順女老少脈異老弱之人脈宜緩弱若過旺者病也少壯之人脈宜充實若過弱者病也然又有說焉老人脈旺而非躁者此天稟之厚引年之叟也名曰壽脈若脈躁疾有表無里則為孤陽其死近矣壯者脈細而和緩三部同等此天稟之靜清逸之士也名曰陰脈若細小勁直前後不等可以決死期矣因形氣以定診說增補逐脈審察者一定之矩也隨人變通者圓機之士也肥盛之人氣居於表六脈常帶浮洪瘦小之人氣斂於中六脈常帶沉數性急之人五至方為平脈性緩之人四至便作熱看身長宜疏下指身短宜密下指北人多實南人多弱酒後之脈常數飯後之脈常洪遠行必疾久飢必虛室女常濡嬰兒常數經曰形氣相得者生三五不調者死其可不察乎脈無根有兩說以寸關尺三部言之尺為根關為干寸為枝葉若尺部無神則無根矣以浮中沉三候言之沉候為根中候為干浮候為枝葉若沉候不應則無根矣女人脈法陰搏陽別謂之有子謂尺中之陰脈搏大與寸部之陽部迥別者乃有子也陰虛陽搏謂之崩陰虛血衰於下則陽火上亢矣血為火迫不得而安其位乃為崩漏之疾手少陰脈動甚者妊子也手少陰者心脈也動甚者形如豆粒急數有力也心主血血旺乃能成胎心脈動甚血旺之象故當妊子滑伯仁曰三部脈浮沉正等無他病而不月者為有妊也得太陰脈為男得太陽脈為女太陰脈沉太陽脈浮左疾為男右疾為女左右俱疾為生二子尺脈左大為男右大為女左右俱大產二子左手沉實為男右手浮大為女左右手俱沉實猥生二男左右手俱浮大猥生二女左右尺俱浮為產二男不爾則女作男生謂一男一女之胎女胎死而男胎生左右尺俱沉為產二女不爾則男作女生婦人陰陽俱盛曰雙軀言左右兩尺部俱大而有力也若少陰微緊者血積凝濁經養不周胎則偏夭其一獨死其一獨生不去其死害母失胎何以知懷子之且生也岐伯曰身有病而無邪脈也有病如腹痛拘急之類無邪脈謂無病脈也婦人慾生其脈離經夜半覺日中則生也離經者謂離於經常之脈如昨小今大昨澀今滑昨浮今沉之類夜半覺日中生子者子午相沖也婦人經斷有軀其脈弦者後必血下不成胎也弦者肝脈也肝主疏泄今見弦則肝脈太過不能藏血也婦人尺脈微遲為居經月事三月一下微遲者虛寒之脈也居經猶云停經也三月一下為血不足也婦人尺脈微弱而澀少腹冷惡寒年少得之為無子年大得之為絕產新產傷陰出血不止尺脈不能上關者死小兒脈法小兒五歲以下未可診寸關尺惟看男左女右虎口食指第一節寅位為風關脈見易治第二節卯位為氣關脈見為病深第三節辰位為命關脈見為命危紫脈為熱紅脈傷寒青脈驚風白脈疳疾黃脈隱隱為常候也黑脈者多危脈紋入掌為內鉤紋彎里為風寒紋彎外為食積五歲以上以一指取寸關尺三部六至為和平七八至為熱四五至為寒半歲以下於額前眉端髮際之間以名中食三指候之兒頭在左舉右手候兒頭在右舉左手候食指近發為上名指近眉為下中指為中三指俱熱外感於風鼻塞咳嗽三指俱冷外感於寒內傷飲食發熱吐瀉食中二指熱主上熱下冷名中二指熱主夾驚食指熱主食滯諸病宜忌之脈傷寒未汗宜陽脈忌陰脈已汗宜陰脈忌陽脈頭痛宜浮滑忌短澀心痛宜浮滑忌短澀中風宜浮遲忌急數咳嗽宜浮濡忌沉伏喘急宜浮滑忌短澀水腫宜浮大忌沉細虛勞宜微弱忌洪數吐血宜沉小忌實大衄血宜沉細忌浮大脫血宜陰脈忌陽脈癆瘵宜軟緩忌細數消渴宜數大忌虛小腹脹宜浮大忌沉小腸澼宜沉小忌數大即痢疾下利宜沉細忌浮大同泄瀉霍亂宜浮大忌微遲癥瘕宜沉實忌虛弱痞滿宜浮大忌沉小痿痹宜虛濡忌緊急顛癇狂宜實大忌沉細墮傷宜緊急忌弱小金瘡宜微細忌緊數中惡宜緊細忌浮大癰疽宜微緩忌滑數中毒宜洪大忌微細新產宜沉滑忌弦緊帶下宜虛遲而滑忌疾急崩漏宜微弱忌實大䘌蝕宜虛小忌緊急腹痛宜沉細忌弦長怪脈雀啄連三五至而歇歇而再至如雀啄食脾絕也屋漏良久一至屋漏滴水之狀胃絕也彈石從骨間劈劈而至如指彈石腎絕也解索散亂如解繩索精血竭絕也蝦游沉時忽一浮如蝦游然靜中一動神魂絕也魚翔浮時忽一沉譬魚翔之似有似無命絕也釜沸如釜中水火燃而沸有出無入陰陽氣絕也七診岐伯曰察九候七診九候注見前獨小者病獨大者病獨疾者病獨遲者病獨熱者病獨寒者病獨陷下者病此言九候之中有獨見之脈而與他部不同即按其部而知其病之所在也七者之中既言獨疾則主熱矣既言獨遲則主寒矣而又言獨寒獨熱者何也必於陰部得沉微遲澀之脈故又言獨寒也必於陽部得洪實滑數之脈故又言獨熱也獨陷下者沉伏而不起者也形肉已脫九候雖調猶死形肉脫去者大肉盡去也脾主肌肉為五臟之本未有脾氣脫而能生者雖九候之中無獨見之七診然終不免於死亡矣七診雖見九候皆從者不死從順也謂脈順四時之令合五臟之常及與病症為順也既得順候雖有獨大獨小等不至於死也必先問明然後診脈素問徵四失篇曰診病不問其始憂患飲食之失節起居之過度或傷於毒不先言此卒持氣口妄言作名為粗所窮何病能中此言不問其症之所由起先與切脈未免模糊揣度必不能切中病情者矣素問疏五過篇云凡未診病者必問嘗貴後賤雖不中邪病從內生名曰脫營嘗富後貧名曰失精脫營失精皆陰氣虧損也貴者忽賤富者忽貧未免抑鬱而下舒氣滯則血滯久則新者不生滯者成疾故言脫言失者矣按古之神聖未嘗不以望聞問切四者互相參考審察病情然必先望其氣色次則聞其音聲次則問其病源次則診其脈狀此先後之次第也近世醫者既自附於知脈而病家亦欲試其本領遂絕口不言惟伸手就診而醫者即強為揣摩若揣摩偶合則信為神手而揣摩不合則薄為愚昧噫嘻此內經所謂妄言作名為粗所窮如是而欲拯危起殆何異欲其入室而反閉門耶王海藏云病人拱默惟令切脈試其知否夫熱則脈數寒則脈遲實則有力虛則無力可以脈知也若得病之由及所傷之物豈能以脈知哉故醫者不可不問其由病者不可不說其故蘇東坡云我有病狀必盡告醫者使其胸中瞭然然後診脈則疑似不能惑也我求愈疾而已豈以困醫為事哉若二公之言可以發愚蒙之聾瞶矣望色增補內經曰望而知之者望見其五色以知其病肝青象木肺白象金心赤腎黑脾土色黃一或有病色必變見於面庭矣然肺主氣氣虛則色白腎屬水水涸則面黎青為怒氣傷肝赤為心火炎上痿黃者內傷脾胃紫濁者外感風邪憔悴黝黑必鬱悒而神傷消瘦淡黃乃久病而體憊山根明亮須知欲愈之疴環口黎黑休醫已絕之腎蓋有諸內必形諸外見其表以知其里眉目一占肺肝斯見內經曰能合色脈可以萬全五色者氣之華也赤欲如帛裹朱不欲如赭白欲如鵝羽不欲如鹽青欲如蒼璧之澤不欲如藍黃欲如羅裹雄黃不欲如黃土黑欲如重漆色不欲如地蒼青如翠羽者生赤如雞冠者生黃如蟹腹者生白如豕膏者生黑如烏羽者生且夫五臟六腑之精華上彰於明堂而臟腑各有偏勝盈虛若色若脈亦必隨而應之但當求其有神雖困無害然所謂神者色中有光澤明亮是也即脈有胃氣同一理也良工精而候之可以先知經所謂望而知之謂之神者是也難經曰五臟有五色皆見於面亦當於寸口尺內相應假令色青其脈當弦而急色赤其脈浮大而散色黃其脈中緩而大色白其脈浮澀而短色黑其脈沉濡而滑脈數尺之皮膚亦數脈急尺之皮膚亦急脈緩尺之皮膚亦緩脈澀尺之皮膚亦澀脈滑尺之皮膚亦滑假令色青其脈浮澀而短若大而緩為相勝色青脈澀而短乃金剋木脈大而緩乃木剋土皆為相勝之脈浮大而散若小而滑為相生也浮大而散心脈也乃木生火小而滑腎脈也乃水生木皆為相生之脈內經曰凡治病察其形氣色澤脈之盛衰病之新久乃治之無後其時形氣相得謂之可治色澤以浮謂之易已脈從四時謂之可治脈弱以滑是有胃氣命曰易治取之以時形氣相失謂之難治色夭不澤謂之難已脈實以堅謂之益甚脈逆四時為不可治必察此四者而明告之又曰色味當五臟白當肺辛赤當心苦青當肝酸黃當脾甘黑當腎咸故白當皮赤當脈青當筋黃當肉黑當骨靈樞曰五色各見其部察其浮沉以知淺深察其澤夭以觀成敗察其散摶音團以知遠近視色上下以知病處積神於心以知往今不明不澤其病不甚其色散駒駒然未有聚駒駒然如馬之奔散其病散而氣痛則聚未成也浮沉淺深皆內外陰陽之義然細繹之浮沉雖有內外之殊而吉凶必以夭澤為辨如浮而澤者浮則其病淺澤則神有餘雖病即愈吉之吉者也若浮而夭者其病雖淺神氣將衰主病氣漸重之兆安得謂之吉乎如沉而夭者沉則其病深夭則其神不澤其病必死凶之凶者也若沉而澤者其病雖深神將復振主病氣漸退之兆安得謂之凶乎此只就一浮一沉之中而分順逆若更以順色濃淡察之則順又有輕重之別矣至於察其散摶以知遠近未嘗不嘆色之聚散不定也散者如雲撤散而不聚其色漸漸而散先濃後淡先定後行也主病色漸退之兆即經所謂其色散駒駒然未有聚其病散而氣痛聚未成也可見以色之聚散以為驗摶者如物摶聚而不散其色漸漸而聚先淡後濃先行後定也主病氣方來之機即經所謂散為痛摶為聚左右內外各如其形色耳氣色散者為痛而不至成聚若摶聚不散則成聚而不止於痛由此觀之病氣方來霍然之期尚遠病氣漸退痊愈之日已近夫如是重病色逆若兼撤散之形未可即決其凶輕病而色順如兼摶聚之形未可即言其吉然不明不澤之色雖非吉兆乃不致沉夭亦非必死故曰其病不甚也此皆軒岐言外之義若不體認會悟其微而決吉凶一有不驗言望色難憑咎將誰歸所云各色各見其部察其浮沉以知淺深又將各部而察之其條分縷析如江海之通眾流豈能以紙上之言盡者哉黃帝曰黃赤為風青黑為痛白為寒黃而膏潤為膿赤甚為血痛甚為攣寒甚為皮膚不仁又曰黃赤為熱色貴明潤不欲沉夭夭然色不澤其脈空虛為奪血鼻位中央屬土主脾通呼吸兼主肺為肺之官也鼻色黃者小便難獨鼻尖青黃者其人必為淋也青者腹中痛微黑者有水氣白者亡血黃白無澤氣虛有痰紫濁時病赤為熱鮮紅有留飲鼻孔乾燥必衄血鼻燥如煙煤屬陽毒熱極及鼻孔冷滑而黑屬陰毒冷極皆危鼻塞濁涕是風熱鼻流清涕是肺寒鼻孔痔脹屬肺熱有風顴色赤者心病顴與顏黃黑者腎病赤色出兩顴大如拇指病雖小愈必卒死傷寒汗不出大顴發赤噦者死顴見青氣者死面白顴赤火剋金也為賊邪其病不治肝熱病者左頰先赤肺熱病者右頰先赤耳間青脈起掣病耳痛耳腫耳聾及耳前紅腫皆系少陽之熱人中平滿主有水土敗唇反甲篤乙死唇舌者肌肉之本也脾病者唇黃唇見五色者病在脾唇色如紅蓮光澤者無病舌乾唇燥為脾熱燥而紅者吉燥而黑者凶腫赤者熱極青黑者寒極黃者血虛白者失血口苦膽熱甜者脾熱淡亦脾熱口燥咽乾者腎熱舌乾口燥者心熱口噤咬牙者痙病唇口生瘡聲啞者狐惑齒燥無津陽明熱極齒燥脈虛是中暑唇舌苔上有斷紋者難治唇青舌卷環口黧黑口張氣直唇口顫搖者死舌短顴赤者心病少陰氣上逆厥則齧舌舌色鮮紅潤澤者吉黑者凶濕滑者吉燥澀者凶白苔者胸中有寒丹田有熱苔白而滑邪未入府在半表半裡宜和解苔黃者邪入胃宜下苔燥黑生芒刺者難治法宜急下身不熱口不渴苔黑而滑者屬陰寒法宜急溫舌卷焦黑而燥者陽毒熱極宜急下舌青苔滑無熱不渴者陰毒寒極宜急溫舌紫黑者陰寒赤紫者陽熱舌硬舌腫舌卷舌短舌強囊縮者難治若語言不清神昏脈脫者死陰陽易舌出數寸死夏令熱病苔黑燥渴者可治不在必死之例若黑苔刮不去及去易生刺裂者必死冬月黑苔者必死婦人難產唇舌俱青者母子俱死面赤舌青子死母活面青舌赤子活母死面黃而淡脾胃有傷四肢痿弱腹脹面黃而濁如熏濕盛黃疸黃如橘色多熱黃兼青紫脈芤者瘀血在胃或脅必有塊面上白點是蟲積面色青黃白不常及有如蟹爪路一黃一白者主食積目黑頰赤主痰熱目胞黑者痰也眼黑行走呻吟者骨節痠痛痰入骨也眼黑麵黃四肢痿痹屈伸不便者風痰也傷寒眼下青色主挾陰面黃目青為傷酒目睛黃酒疸面黃白及腫連眼胞者谷疸其人必心下痞目色赤者病在心白在肺青在肝黑在腎黃在脾黃色不可名者病在胸中面黃目青及面黃目赤面黃目白面黃目黑者皆不死面赤目白面青目黑面黑目白面赤目青者皆死面目有黃色是有胃氣為吉病人鼻準明山根亮目眥黃光為有起色目黃心煩脈和者病將愈平人忽見黑氣起於口鼻耳目邊者凶明堂眼下青色多欲勞傷精神不爾即夜未睡黑而瘦陰虛火旺臂多青脈是脫血心病傳肺肝病傳脾脾病傳腎腎病傳心肺病傳肝俱死五臟已奪神明不守五臟氣絕大小便不禁手足不仁三陰氣絕則目眩轉目矇目矇為失志失志則目矇者死三陽氣絕則陰與陽相離陰陽相離則腠理泄絕汗乃出大如貫珠轉出不流旦占夕死夕占旦死形診增補人之大體為形形之所充者氣形盛氣者夭肥白是也氣盛形者壽修長黑瘦有神者形盛為有餘邪氣實也消瘦為不足正氣虛也氣實形實氣虛形虛形盛脈細少氣不足以息者死形瘦脈大胸中多氣者死形氣相得者生參伍不調者死肥人多中風以形厚氣虛難以周流氣滯痰生痰則生火故暴厥也瘦人陰虛血液衰少相火易亢故多勞嗽病人形脫而氣盛者死盛則喘促狂亂之類是邪氣實也形體充大而皮膚寬緩者壽形體充大而皮膚緊急者夭形氣相失謂之難治形盛氣虛氣盛形虛形澀而脈滑形滑而脈澀形大而脈小形長脈短形短脈長肥人脈細小輕虛如絲羸人脈躁者俱凶血實氣虛則肥血虛氣實則瘦肥者能寒不能熱瘦者能熱不能寒髯美而長至胸陽明血氣盛髯少血氣弱不足則無髯美髯者太陽多血坐而伏者短氣也行遲者痹也坐而下一腳者腰痛也裡實護腹如懷卵物者心痛也持脈時其人欠者無病也息搖肩者心中堅息引胸中上氣者咳息張口短氣者肺痿吐沫掌中寒腹中寒掌中熱氣不足虛火盛診時病人叉手摸心閉目不言必心虛怔忡倉廩不藏者門戶不要也水泉不止者膀胱不藏也頭者精明之府頭傾視深精神將奪背者胸中之府背曲肩隨府將壞矣腰者腎之府轉搖不能腎將憊矣膝者筋之府屈伸不能行將僂附筋將憊矣骨者髓之府不能久立行則振掉骨將憊矣凡診脈時病人欠伸者病詐陽引而上陰引而下陰陽相引故欠而病詐及向壁臥聞師到不驚起而目盻視若三言三止脈之嚥唾亦詐病也其脈本和當以危言動之須服吐下藥或針灸數十處乃愈以試嚇之得其真情可也甚有小兒女子初則詐起久則病真以人事糾結相左其初詐病之情則成實病比比然也不可不知聞聲增補難經曰聞其五音以知其病以五臟有五聲以合於五音謂肝呼應角心言應徵脾歌應宮肺哭應商腎聲應羽是也然此義深奧非尋常所能揣測者今以古人經驗簡易之法列為聲診脈之呻者痛也言診時之呻吟言遲者風也遲則蹇澀風痰之症聲如從室中言此中氣有濕也言將終乃復言者此奪氣也謂氣不續言未終止而又言之狀也衣被不斂言語罵詈不避親疏者神明之亂也狂出言懶怯先輕後重此內傷中氣也出言壯厲先重後輕是外感邪盛也攢眉呻吟苦頭痛呻吟不能行起腰足痛叫喊以手按心中脘痛呻吟不能轉身腰痛搖頭以手捫腮唇齒痛行遲者腰腳痛診時吁氣者鬱結紐身者腹痛形羸聲啞勞瘵之不治者咽中有肺花瘡也暴啞者風痰伏火或暴怒叫喊所致聲嘶血敗久病不治坐而氣促痰火哮喘久病氣促危中年人聲濁痰火診時獨言獨語首尾不應是思慮傷神傷寒壞病聲啞為狐惑上唇有瘡蟲食其藏下唇有瘡蟲食其肛氣促喘息不足以息者虛甚也雖病其聲音清亮如故者吉平日無寒熱短氣不足以息者實也實者是痰與火也問診增補凡診病必先問是何人或男或女或老或幼次問得病之日受病之因及飲食胃氣如何大小便如何曾服何藥日間如何夜寐如何胸膈有無脹悶之處問之不答必耳聾須詢其左右平素如何否則病久或汗下過傷致聾問而懶答或點頭皆是中虛昏憒不知人事非暴厥即久病也如婦人多中氣診婦人必當問月信如何寡婦氣血凝滯兩尺多滑不可誤斷為胎室女亦有之心腹脹痛須問新久凡診須問所欲何味何物或葷素或縱飲茶酒喜甘脾弱喜酸肝虛頭身臂膊作痛必須問曾生惡瘡否曾服何藥否臨診必審形志如何或形逸心勞或形勞志苦或抑鬱傷中或貴脫勢病從內生名曰脫營言耗散其營氣也嘗富後貧憂悲內結名曰失精言其精神喪失也皮焦筋屈痿痹為攣以其外耗於衛內奪於營良工診之必知病情再問飲食居處暴樂暴苦始樂後苦暴怒傷陰暴喜傷陽形體毀沮精華日脫邪氣內並謂邪乘其虛而並也故聖人之治病也必察天地陰陽四時經紀五臟六腑雌雄表裡刺灸砭石毒藥所主從容人事以明經道貴賤貧富各異品理問年少長勇怯之性審於部分知病本始七診九候症必副矣望舌增補張三錫曰金鏡錄載三十六舌以辨傷寒之法已備再三討論不過陰陽表裡虛實寒熱而已陶節庵曰傷寒邪在表則舌無苔熱邪傳裡舌苔漸生自白而黃黃而黑甚則黑裂黑苔多凶如根黑中黑尖黑皆屬熱全黑屬熱極為難治矣外感挾內傷宿食重而結於心下者五六日舌漸黃或中干旁潤名中焙舌則裡熱未重若全乾黃黑皆為里症分輕重下之如下之或再下之不減者尚有宿垢結於中宮也必切其脈之虛實及中氣之何如實者宜潤而下之不可再攻虛人神氣不足宜回其津液固其中氣有用生脈散對解毒湯而愈者此則陽極似陰之症有用附子理中湯冷服而愈者此則陰極似陽之症不可不辨白苔屬寒外症煩躁欲坐臥泥水中乃陰寒逼其無根之火而然脈雖大而不鼓當從陰症治若不大躁者嘔吐者當從食陰治死候增補屍臭肉絕舌卷及囊縮肝絕口不合脾絕肌腫唇反胃絕髮直齒枯骨絕遺尿腎絕毛焦肺絕面黑直視目瞑不見陰絕目眶陷目系傾汗出如珠陽絕手撒戴眼太陽絕病後喘瀉脾肺將絕目正圓痙不治吐沫面赤面青黑唇青人中滿發與眉衝起爪甲下肉黑手掌無紋臍突足趺腫聲如鼾睡脈浮無根面青伏眠目盲汗出如油以上肝絕八日死眉傾膽絕手足爪甲青或脫落呼罵不休筋絕八日死肩息回視心絕立死髮直如麻不得屈伸自汗不止小腸絕六日死口冷足腫腹熱臚脹泄利無時脾絕五日死脊骨疼腫身重不可轉側胃絕五日死耳干舌腫溺血大便赤泄肉絕九日死口張氣出不反肺絕三日死泄利無度大腸絕齒乾枯面黑目黃腰欲折自汗腎絕臟腑分配於面部增補靈樞曰五臟六腑各有部分能別部分萬舉萬當庭者首面也庭天庭也謂之首面闕上者眉間上分咽喉也闕中者眉之中肺也下極者印堂心也直下者山根肝也肝左者山根之左膽也下者胃之下脾也方上者方始上於脾胃也中央者脾之下壽之上大腸也挾大腸者腎也腎有兩故挾大腸也當腎者臍也腎與大腸臍俱在壽上面王以上者面王準頭也鼻為面之王小腸也準頭上色黃小便難面王以下者膀胱子處也準頭之部又分上下男小腹痛卵痛女子主膀胱子處病顴者肩也顴後者臂也臂下者手也目內眥上者膺乳也挾繩而上者背也耳旁為繩臂背為外膺乳為內故在目內眥循牙車以下者股也中央者膝也膝居股脛之中膝以下者脛也脛以下者足也巨分者股里也巨大也上下牙床大分處以候股牙床司開合亦如股里之任屈伸也巨屈者膝臏也上下唇交接處是地倉穴以唇口大為屈轉以候膝臏又唇為言語飲食之門戶亦如膝臏為屈伸奔走之關節俱動而不休故應候焉此五臟六腑肢節之部分也按靈樞此文雷公問黃帝答者細繹經旨自首面而至膀胱子處十四部配於明堂者也自顴至膝臏十一部配顴之左右及顴之下也由此觀之明堂為內兩顴為外一部之分而有內外黃帝曰明堂者鼻也闕者眉間也庭者顏也此三者立內部蕃者頰側也蔽者耳門也此二者別外部又按五官之辨曰明堂骨高以起平以直五臟次於中央六腑挾於兩側首面上於闕庭王宮在於下極前後互觀臟腑配於明堂肢體列於兩顴上下左右不更彰彰乎診脈要訣素問脈要精微論曰持脈有道虛靜為保切脈之道貴於精誠嫌其擾亂故必心虛而無他想身靜而不言動然後可以察脈之微而不失病情也保者不失也若躁動不安瞻視不定輕言談笑亂說是非不惟不能得脈中之巧適足為旁觀者鄙且笑也決死生黃帝曰決死生奈何岐伯曰形盛脈細少氣不足以息者危身形肥盛而脈形細弱且少氣而不足以呼吸則外有餘而內不足枝葉盛而根本拔也故曰少氣不足以息者危形瘦脈大胸中多氣者死身形瘦削而脈形洪大且胸中多氣者陰不足而陽有餘也孤陽不生故知必死形氣相得者生形盛者脈亦盛形小者脈亦小則形與脈相得矣相得者相合也參伍不調者病參伍者數目也言其至數不勻往來無常度故知必病三部九候皆相失者死皆相失者如應浮而沉應小而大違四時之度失五臟之常者矣上下左右之脈相應如參舂者病甚上下左右相失不可數者死上下左右即兩手之三部九候也參舂者實大有力如杵之舂故曰病甚若失其常度至於急數而不可數即八九至之絕脈也安得不死中部之候相減者死眾部雖調而中部獨不及者為根本敗壞安得生乎辨七表八里九道之非謝縉翁曰脈經論脈二十四種初無表裡九道之目其言芤脈為陰脈訣乃以芤為七表之陽仲景辨脈云浮大動數滑陽也沉澀弱弦微陰也脈訣九道以動為陰七表以弦為陽似此之類頗多吳草廬曰脈之浮沉虛實緊緩數遲滑澀長短之相反配匹自不容易況有難辨如洪散俱大而洪有力微細俱小而微無力芤類浮而邊有中無伏類沉而邊無中有似豆粒而搖搖不定者動也似鼓皮之如如不動者革也俱對待也又有促結代皆有止之脈促疾結緩故為可對代則無對總二十七脈不止於七表八里九道二十四脈也戴同父曰脈不可以表裡定名也軒岐越人叔和皆不言表裡脈訣竊叔和之名而立七表八里九道為世大惑脈之變化從陰陽生但可以陰陽對待而言各從其類豈可以一浮二芤為定序而分七八九名之乎廬山劉立云以浮沉遲數為綱而教學者雖似為捷徑然必博而反約乃能入妙若以此為足亦自畫矣李時珍曰脈經論脈只有二十四種無長短二脈脈訣之歌亦止二十四種增長短而去數散皆非也素難仲景論脈止別陰陽初無定數如素問之鼓搏喘橫仲景之惵卑高章剛損縱橫逆順之類是也後世失傳無所依准因立名為之指歸耳今之學者按圖索驥猶若望洋而況舉其全旨乎此草廬公之獨得要領也滑伯仁曰脈之陰陽表裡俱以對待而言高陽生之七表八里九道蓋穿鑿矣求脈之明反為脈之晦脈決死期素問大奇論脈至浮合浮合如數一息十至以上是經氣予不足也微見九十日死浮合者如浮萍之合有表而無里也如數者似數而非數熱之陽脈也是經氣衰極耳微見者初見也初見此脈便可決於九十日而死時季改易天道更而人氣從之也十至當作七至若果十至則為絕脈死在旦夕豈待九十日哉故知錯誤無疑矣脈至如火薪然是心精之予奪也草乾而死脈如火熱是洪大之極也但見本臟之脈無胃氣以和之則知心精之已奪矣夏乃火令猶未遽絕至秋深而草乾陽消之候其死期必矣脈至如散葉是肝氣予虛也木葉落而死如散葉者浮漂無根也肝木大虛違其沉弦之常矣秋風動而木葉黃落金旺則木絕故死脈至如省客省客者脈塞而鼓是腎氣之不足也懸去棗華而死省者禁也故天子以禁中為省中塞者沉而不利也鼓者搏而有力也伏藏於內而鼓搏正如禁賓客而不見獨知於內而恣肆也故曰如省客也是腎氣陰寒不安之狀也棗花去則當長夏也土旺水涸腎虛者不能支也脈至如丸泥是胃精予不足也榆莢落而死丸泥者彈丸也滑動有力沖和之氣蕩然矣春深而榆莢始落木令方張弱土必絕脈至如橫格是膽氣予不足也禾熟而死橫格者如橫木之格也且長且堅東方之真臟脈見矣禾熟於秋金令乘權木安得不敗脈至如弦縷是胞精予不足也病善言下霜而死不言可治弦縷者如弦之急如縷之細也胞者心也心包絡也言者心聲也火過極而神明無以自持則多言不寐也夫脈細則反其洪大之常善言則喪其神明之守方霜下而水帝司權火當絕矣脈至如交漆交漆者左右旁至也微見三十日死交漆者瀉漆也左右旁至者或左或右不由正道也微見此脈以一月為期必不祿矣脈至如湧泉浮鼓肌中太陽氣予不足也少氣味韭英而死湧泉者如泉之湧浮鼓於肌肉之上而乖違乎就下之常膀胱衰弱陰精不能上奉故少氣耳韭英新發木帝司命則水官謝事矣脈至如頹土之狀按之不得是肌氣之不足也五色先見黑白壘發而死虛大無根按之即不可得見頹土之狀也肌氣即脾氣脾主肌肉也黑為水色土虛而無所畏反來乘之矣壘即蘽也蓬蘽有多類而白者發於春當木旺之時土安得而不敗脈至如懸雍懸雍者浮揣切之益大是十二俞之予不足也水凝而死懸雍者喉間下垂之肉也浮揣之益大即知重按之而必空矣浮短者孤陽亢極之象也十二俞即十二經之系也水凝冰結陰盛之時而孤陽有不絕者乎脈至如偃刀偃刀者浮之小急按之堅大急五臟菀熱寒熱獨並於腎也其人不得坐立春而死浮之小急如刀口也按之堅大急即刀背也菀者積結也五臟結熱故發寒熱也陽旺則陰消故獨並於腎也腰者腎之府腎虛則不能起坐迨立春而陽氣用事陰日以衰安得不死也脈至如丸滑不直手不直手者按之不可得也是大腸氣予不足也棗葉生而死如丸者短而滑也短而無根按之不得也大腸之金氣傷也棗葉初生新夏火旺衰金從此逝矣脈至如華者令人善恐不欲坐臥行立常聽是小腸氣予不足也季秋而死華者草木之花也在枝葉而不在根株乃輕浮而虛也小腸氣通於心善恐不欲坐臥者心神怯而不寧也行立常聽者恐懼多而生疑也丙火墓於戌故當九月季秋死奇經八脈督脈尺寸中央俱浮直上直下按潔古云督者都也為陽脈之都綱其脈起於下極之俞並於脊裡上至巔極於上齒縫中齦交穴其為病也主外感風寒之邪內經以為實則脊強虛則頭重王叔和以為腰背強痛不得俯仰大人癲病小兒風癇尺寸中央三部皆浮且直上直下為弦長之象故主外邪任脈寸口脈緊細實長至關又曰寸口脈如丸按任脈起於中極之下循腹上喉至於齦交極於目下承泣穴為陰脈之統會其為病也男子內結七疝女子帶下瘕聚王叔和亦以為少腹繞臍引陰中痛又曰寸口脈丸主腹中有氣如指上搶心俯仰拘急緊細實長者中寒而氣結也寸口脈丸即動脈也狀如豆粒厥厥搖動故主氣上衝心衝脈尺寸中央俱牢直上直下按衝脈起於氣街在少腹毛中兩旁各二寸挾臍左右上行至胸中而散為十二經之根本故稱經脈之海亦稱血海靈樞曰衝脈血盛則滲灌皮膚生毫毛女子數脫血不營其口唇故髯須不生宦者去其宗筋傷其衝脈故須亦不生越人曰衝脈為病逆氣而裡急或作躁熱皆衝脈逆也宜補中益氣湯加知柏王叔和曰沖督用事則十二經不復朝於寸口其人苦恍惚狂癡又曰衝脈與督脈無異但督脈浮而衝脈沉耳陽蹺脈寸部左右彈按陽蹺脈起於跟中上外踝循脅上肩夾口吻至目極於耳後風池穴越人曰陽蹺為病陰緩而陽急王叔和注云當從外踝以上急內踝以上緩又曰寸口前部左右彈者陽蹺也苦腰背痛癲癇僵仆惡風偏枯𤸷痹體強左右彈即緊脈之象𤸷音頑麻木也陰蹺脈尺部左右彈按陰蹺脈起於跟上內踝循陰自胸至咽極於目內眥睛明穴越人曰陰蹺為病陽緩而陰急王叔和注曰當從內踝以上急外踝以上緩又曰寸口脈後部左右彈者陰蹺也苦癲癇寒熱皮膚淫痹少腹痛裡急腰及髖窌下連陰痛男子陰疝女人漏下張潔古曰蹺者蹺疾也二蹺之脈起於足使人蹺捷也陽蹺在肌肉之上陽脈所行通貫六腑主持諸表陰蹺在肌肉之下陰脈所行通貫五臟主持諸里髖音寬窌音料帶脈關部左右彈按帶脈起於季脅圍身一周如束帶然越人曰帶之為病腹滿腰溶溶如坐水中溶溶緩縱之貌明堂曰女人少腹痛裡急瘛瘲月事不調赤白帶下楊氏曰帶脈總束諸脈使不妄行如人束帶而前垂此脈若固則無帶下漏經之症矣瘛音熾瘲音縱陰維脈尺外斜上至寸按陰維脈起於諸陰之交發於內踝上五寸循股入小腹循脅上胸至頂前而終叔和云苦癲癇僵仆失音肌肉痹癢汗出惡風身洗洗然也又曰陰維脈沉大而實主胸中痛脅下滿心痛脈如貫珠者男子脅下實腰中痛女子陰中痛如有瘡內踝上五寸築賓穴也陽維脈尺內斜上至寸按陽維脈起於諸陽之會發於足外踝下一寸五分循膝上髀厭抵少腹循頭入耳至本神而止叔和曰苦肌肉痹癢皮膚痛下部不仁汗出而寒顛仆羊鳴手足相引甚者不能言潔古曰衛為陽主表陽維受邪為病在表故作寒熱營為陰主裡陰維受邪為病在裡故苦心痛陰陽相維則營衛和諧營衛不諧則悵然失志不能自收持矣髀音皮外踝下一寸五分申脈穴李時珍曰人身有經脈絡脈直行曰經旁行曰絡經凡十二手之三陰三陽足之三陰三陽是也絡凡十五乃十二經各有一別絡而脾又有一大絡並任督二絡為十五也共二十七氣相隨上下如泉之流不得休息陰脈營於五臟陽脈營於六腑陰陽相貫如環無端其流溢之氣入於奇經轉相灌溉奇經之八脈不拘制於十二正經無表裡配合故謂之奇蓋正經猶溝渠奇經猶河澤正經之脈隆盛則溢於奇經故秦越人比之天雨溝渠溢滿滂沛河澤此靈素未發之旨也凡經十二每經各有一別絡而脾又有一大絡並任督二絡共二十七氣又曰陽維起於諸陽之會由外踝而上行於衛分陰維起於諸陰之交由內踝而上行於營分所以為一身之綱維也陽蹺起於跟中循外踝上行於身之左右陰蹺起於跟中循內踝上行於身之左右所以使機關之蹺捷也督脈起於會陰循背而行於身之後為陽脈之總督故曰陽脈之海任脈起於會陰循腹而行於身之前為陰脈之承任故曰陰脈之海衝脈起於會陰夾臍而行直衝於上為諸脈之衝要故曰十二經脈之海帶脈則橫圍於腰狀如束帶所以總約諸脈者也是故陽維主一身之表陰維主一身之裡以乾坤言也陽蹺主一身左右之陽陰蹺主一身左右之陰以東西言也督脈主身後之陽任沖主身前之陰以南北言也帶脈橫束諸脈以六合言也故醫而知此八脈則十二經十五絡之大旨得矣
